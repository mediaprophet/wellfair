ood Pressure data found for dashboard trend.\")\r\n\r\n", "ui/tabs/profile_intake.py": "from __future__ import annotations\nimport streamlit as st\nfrom datetime import datetime, date\nfrom src.phr_models.profile import (\n    EpistemicStatus, PatientProfile, DisabilitySupport, AllergyConditionNode,\n    DwellingType, SleepSecurityLevel, SocialFoundationsRecord, WalkaboutProfile\n)\n\ndef render_profile_intake(dark_mode: bool, normalized: dict):\n    st.markdown(\"## \ud83d\udccb Sovereign Profile & Medical Intake\")\n    \n    st.markdown(\n        \"\"\"<div class=\"premium-card\" style=\"border-left: 5px solid #3b82f6; margin-bottom: 20px;\">\n<h4 style=\"margin: 0; color: #3b82f6;\">\ud83d\udccb Sovereign Intake Credentials & Epistemic Audit</h4>\n<p style=\"font-size: 0.9rem; color: #64748b; margin-top: 5px; margin-bottom: 0;\">\nManage your personal demographics, pronouns, ancestry, and primary language. Track disability accessibility support needs, and audit pre-existing conditions and allergies with linked evidence.\n</p>\n</div>\"\"\",\n        unsafe_allow_html=True\n    )\n    \n    # Initialize mock data in session state\n    if \"patient_profile\" not in st.session_state:\n        st.session_state.patient_profile = {\n            \"full_name\": \"John Doe\",\n            \"date_of_birth\": date(1980, 5, 20),\n            \"biological_sex\": \"Male\",\n            \"pronouns\": \"He/Him\",\n            \"gender_identity\": \"Male\",\n            \"ancestry_lineage\": \"Anglo-Celtic / Western European\",\n            \"primary_language\": \"English\",\n            \"medicare_number\": \"1234 56789 1\",\n            \"insurance_provider\": \"Medibank Private\",\n            \"insurance_policy_number\": \"MP987654321\",\n            \"emergency_contact_name\": \"Jane Doe\",\n            \"emergency_contact_phone\": \"+61 400 123 456\"\n        }\n        \n    if \"disability_supports\" not in st.session_state:\n        st.session_state.disability_supports = [\n            {\n                \"id\": \"dis-1\",\n                \"support_name\": \"Sensory & Cognitive Accommodations\",\n                \"description\": \"Requires visual formatting overrides (such as high-contrast and dark mode presets) and simplified textual summaries during clinical stress events.\",\n                \"accessibility_requirements\": [\"Visual Layout Filters\", \"Plain Text Summaries\"],\n                \"has_ndis_funding\": True,\n                \"registered_provider\": \"NDIS NSW Support Services\"\n            }\n        ]\n        \n    if \"allergies_conditions\" not in st.session_state:\n        st.session_state.allergies_conditions = [\n            {\n                \"id\": \"cond-1\",\n                \"name\": \"Penicillin Allergy\",\n                \"category\": \"Drug Allergy\",\n                \"epistemic_status\": EpistemicStatus.DISPUTED_MISDIAGNOSIS,\n                \"dispute_rationale\": \"Childhood skin rash occurred; modern clinical skin testing at Sydney Allergy Centre was negative (12-Mar-2025). Asserted drug allergy is likely a misdiagnosis.\",\n                \"date_onset\": date(1986, 6, 12),\n                \"linked_evidence_uris\": [\"DiagnosticReport_Lipids\"]\n            },\n            {\n                \"id\": \"cond-2\",\n                \"name\": \"Hypercholesterolemia\",\n                \"category\": \"Cardiovascular / Lipid\",\n                \"epistemic_status\": EpistemicStatus.CLINICALLY_VERIFIED,\n                \"dispute_rationale\": None,\n                \"date_onset\": date(2023, 11, 15),\n                \"linked_evidence_uris\": [\"DiagnosticReport_Lipids\"]\n            }\n        ]\n\n    if \"social_foundations\" not in st.session_state:\n        st.session_state.social_foundations = {\n            \"dwelling_type\": \"couch-surfing\",\n            \"homelessness_or_insecure_sleep\": True,\n            \"sleep_insecurity_reason\": \"Family separation & financial strain\",\n            \"threat_of_violence\": True,\n            \"actual_violence_experienced\": False,\n            \"environmental_hazards\": [\"Black Mould\", \"Insecure Lock\"],\n            \"is_home_distinct_from_dwelling\": True,\n            \"is_trapped_at_location\": True,\n            \"trapped_reason\": \"Lack of affordable housing / financial barriers to move out\",\n            \"deeply_unhappy_or_threatened\": True,\n            \"subjective_safety_score\": 4,\n            \"feels_unsafe_due_to_own_behaviors\": False,\n            \"own_behaviors_detail\": \"\"\n        }\n\n    if \"walkabout_profile\" not in st.session_state:\n        st.session_state.walkabout_profile = {\n            \"shelter_type\": \"Van (Home on Wheels)\",\n            \"sleep_security_level\": \"public-parking-medium-risk\",\n            \"has_water\": True,\n            \"has_food_storage\": True,\n            \"has_hygiene_facilities\": False,\n            \"has_power\": False,\n            \"transit_frequency\": \"Nomadic / Weekly\",\n            \"transit_details\": \"Traveling between coastal campsites and public parking areas depending on ranger activities\",\n            \"notes\": \"Looking for a safe designated campsite space with electrical hookup.\"\n        }\n        \n    t_profile, t_disability, t_allergies, t_social = st.tabs([\n        \"\ud83d\udccb Medical Intake & Demographics\",\n        \"\u267f Disability Supports & Needs\",\n        \"\u26a0\ufe0f Allergies & Conditions (Epistemic Vault)\",\n        \"\ud83c\udfe1 Social Foundations & Walkabout\"\n    ])\n    \n    # ------------------ TAB 1: MEDICAL INTAKE ------------------\n    with t_profile:\n        st.markdown(\"### \ud83d\udccb Sovereign Patient Intake Sheet\")\n        st.write(\"This data represents your self-sovereign identity profile, commonly required when registering at a new medical practice.\")\n        \n        prof = st.session_state.patient_profile\n        \n        col_view, col_edit = st.columns([2, 1])\n        \n        with col_view:\n            st.markdown(\"#### Active Intake Credentials\")\n            \n            # Draw intake sheet card\n            st.markdown(\n                f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid #3b82f6; padding: 24px;\">\n<h3 style=\"margin: 0 0 16px 0; color:#3b82f6; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 8px;\"> John Doe</h3>\n<div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; font-size: 0.92rem;\">\n<div><b>Date of Birth:</b> {prof[\"date_of_birth\"].strftime('%B %d, %Y')}</div>\n<div><b>Biological Sex:</b> {prof[\"biological_sex\"]}</div>\n<div><b>Pronouns:</b> {prof[\"pronouns\"]}</div>\n<div><b>Gender Identity:</b> {prof[\"gender_identity\"] or \"Not Specified\"}</div>\n<div><b>Genetic Ancestry:</b> {prof[\"ancestry_lineage\"]}</div>\n<div><b>Primary Language:</b> {prof[\"primary_language\"]}</div>\n<div><b>Medicare Number:</b> {prof[\"medicare_number\"] or \"N/A\"}</div>\n<div><b>Private Insurance:</b> {prof[\"insurance_provider\"]} ({prof[\"insurance_policy_number\"]})</div>\n<div><b>Emergency Contact:</b> {prof[\"emergency_contact_name\"]} ({prof[\"emergency_contact_phone\"]})</div>\n</div>\n</div>\"\"\",\n                unsafe_allow_html=True\n            )\n            \n        with col_edit:\n            st.markdown(\"#### Update Profile\")\n            with st.form(\"edit_profile_form\"):\n                name = st.text_input(\"Full Name\", value=prof[\"full_name\"])\n                dob = st.date_input(\"Date of Birth\", value=prof[\"date_of_birth\"])\n                sex = st.selectbox(\"Biological Sex\", [\"Male\", \"Female\", \"Intersex\"], index=[\"Male\", \"Female\", \"Intersex\"].index(prof[\"biological_sex\"]))\n                pronouns = st.text_input(\"Pronouns\", value=prof[\"pronouns\"])\n                gender = st.text_input(\"Gender Identity\", value=prof[\"gender_identity\"] or \"\")\n                ancestry = st.text_input(\"Genetic Ancestry / Lineage\", value=prof[\"ancestry_lineage\"])\n                lang = st.text_input(\"Primary Language\", value=prof[\"primary_language\"])\n                medicare = st.text_input(\"Medicare Number\", value=prof[\"medicare_number\"] or \"\")\n                ins_prov = st.text_input(\"Insurance Provider\", value=prof[\"insurance_provider\"])\n                ins_pol = st.text_input(\"Insurance Policy Number\", value=prof[\"insurance_policy_number\"])\n                em_name = st.text_input(\"Emergency Contact Name\", value=prof[\"emergency_contact_name\"])\n                em_phone = st.text_input(\"Emergency Contact Phone\", value=prof[\"emergency_contact_phone\"])\n                \n                submitted = st.form_submit_button(\"\ud83d\udcbe Save Profile Changes\")\n                if submitted:\n                    st.session_state.patient_profile = {\n                        \"full_name\": name,\n                        \"date_of_birth\": dob,\n                        \"biological_sex\": sex,\n                        \"pronouns\": pronouns,\n                        \"gender_identity\": gender if gender else None,\n                        \"ancestry_lineage\": ancestry,\n                        \"primary_language\": lang,\n                        \"medicare_number\": medicare if medicare else None,\n                        \"insurance_provider\": ins_prov,\n                        \"insurance_policy_number\": ins_pol,\n                        \"emergency_contact_name\": em_name,\n                        \"emergency_contact_phone\": em_phone\n                    }\n                    st.success(\"Sovereign profile updated.\")\n                    st.rerun()\n\n    # ------------------ TAB 2: DISABILITY SUPPORTS ------------------\n    with t_disability:\n        st.markdown(\"### \u267f Accessibility & Disability Supports\")\n        st.write(\"Track adjustments, sensory needs, assistive aids, or program requirements to ensure clinics accommodate your specific disability supports.\")\n        \n        col_dis_list, col_dis_add = st.columns([2, 1])\n        \n        with col_dis_list:\n            st.markdown(\"#### Registered Disability Accommodations\")\n            for item in st.session_state.disability_supports:\n                reqs_badge = \"\".join([f\"<span style='font-size:0.75rem; background:rgba(0,0,0,0.04); padding:2px 6px; border-radius:4px; margin-right:6px;'>{r}</span>\" for r in item[\"accessibility_requirements\"]])\n                ndis_badge = \"<span style='font-size:0.72rem; background:#10b98122; color:#10b981; padding:2px 6px; border-radius:4px; font-weight:bold; float:right;'>\u2713 NDIS FUNDED</span>\" if item[\"has_ndis_funding\"] else \"\"\n                \n                st.markdown(\n                    f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid #8b5cf6; padding: 16px; margin-bottom: 12px;\">\n{ndis_badge}\n<h4 style=\"margin: 0 0 6px 0; color:#475569;\">{item[\"support_name\"]}</h4>\n<p style=\"font-size:0.88rem; color:#475569; margin: 4px 0;\">{item[\"description\"]}</p>\n<div style=\"margin-top:8px; margin-bottom:8px;\">\n{reqs_badge}\n</div>\n<div style=\"font-size:0.8rem; color:#64748b;\">\n<b>Registered Provider:</b> {item[\"registered_provider\"] or \"Self-managed\"}\n</div>\n</div>\"\"\",\n                    unsafe_allow_html=True\n                )\n                \n        with col_dis_add:\n            st.markdown(\"#### Log Support Requirement\")\n            with st.form(\"add_dis_form\", clear_on_submit=True):\n                sup_name = st.text_input(\"Accommodation Name\", placeholder=\"e.g., Mobility support / Visual reader\")\n                sup_desc = st.text_area(\"Adjustment Description\", placeholder=\"Specify what adjustments are required from medical providers...\")\n                reqs = st.text_input(\"Accessibility Tags (comma separated)\", placeholder=\"e.g. Ramp Access, Sign Language\")\n                has_ndis = st.checkbox(\"NDIS / Government Funded\", value=False)\n                provider = st.text_input(\"Support Coordinator / Provider\", placeholder=\"e.g. NDIS NSW\")\n                \n                submitted_dis = st.form_submit_button(\"\ud83d\udcbe Save Support Need\")\n                if submitted_dis and sup_name:\n                    tags = [r.strip() for r in reqs.split(\",\")] if reqs else []\n                    st.session_state.disability_supports.append({\n                        \"id\": f\"dis-{int(datetime.now().timestamp())}\",\n                        \"support_name\": sup_name,\n                        \"description\": sup_desc,\n                        \"accessibility_requirements\": tags,\n                        \"has_ndis_funding\": has_ndis,\n                        \"registered_provider\": provider if provider else None\n                    })\n                    st.success(\"Accommodation need logged.\")\n                    st.rerun()\n\n    # ------------------ TAB 3: ALLERGIES & CONDITIONS ------------------\n    with t_allergies:\n        st.markdown(\"### \u26a0\ufe0f Allergies & Pre-existing Conditions\")\n        st.write(\"Track clinical diagnoses or self-reported sensitivities. Link cryptographic evidence and audits to flag suspected misdiagnoses or source conflicts.\")\n        \n        col_all_list, col_all_add = st.columns([2, 1])\n        \n        with col_all_list:\n            st.markdown(\"#### Verified & Audited Conditions\")\n            for item in st.session_state.allergies_conditions:\n                status_color = {\n                    EpistemicStatus.CLINICALLY_VERIFIED: \"#10b981\",\n                    EpistemicStatus.SELF_REPORTED_UNVERIFIED: \"#f59e0b\",\n                    EpistemicStatus.SUSPECTED_ONSET: \"#3b82f6\",\n                    EpistemicStatus.DISPUTED_MISDIAGNOSIS: \"#ef4444\"\n                }.get(item[\"epistemic_status\"], \"#64748b\")\n                \n                status_text = {\n                    EpistemicStatus.CLINICALLY_VERIFIED: \"Verified Diagnostic\",\n                    EpistemicStatus.SELF_REPORTED_UNVERIFIED: \"Self-Reported (Unverified)\",\n                    EpistemicStatus.SUSPECTED_ONSET: \"Suspected / Unconfirmed\",\n                    EpistemicStatus.DISPUTED_MISDIAGNOSIS: \"Disputed / Potential Misdiagnosis\"\n                }.get(item[\"epistemic_status\"], \"Unknown\")\n                \n                evidence_section = \"\"\n                if item.get(\"linked_evidence_uris\"):\n                    links = []\n                    for uri in item[\"linked_evidence_uris\"]:\n                        links.append(f\"<a href='#' style='font-size:0.75rem; color:#3b82f6; text-decoration:underline;'>\ud83d\udcc4 Evidence: {uri}</a>\")\n                    evidence_section = \"<div style='margin-top:8px;'>\" + \" | \".join(links) + \"</div>\"\n                    \n                dispute_section = \"\"\n                if item.get(\"epistemic_status\") == EpistemicStatus.DISPUTED_MISDIAGNOSIS and item.get(\"dispute_rationale\"):\n                    dispute_section = f\"\"\"<div style=\"margin-top: 10px; padding: 10px; border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.04); font-size: 0.8rem; color: #ef4444;\">\n<b>Conflict / Dispute Rationale:</b> {item[\"dispute_rationale\"]}\n</div>\"\"\"\n                \n                st.markdown(\n                    f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid {status_color}; padding: 16px; margin-bottom: 12px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center;\">\n<span style=\"font-size:0.75rem; background:rgba(0,0,0,0.04); padding:2px 6px; border-radius:4px; color:#475569; font-weight:bold;\">\n{item[\"category\"].upper()}\n</span>\n<span style=\"font-size:0.75rem; background:{status_color}1a; color:{status_color}; padding:2px 8px; border-radius:4px; font-weight:bold;\">\n{status_text}\n</span>\n</div>\n<h4 style=\"margin: 8px 0 4px 0; color:#475569; font-size:1.1rem;\">{item[\"name\"]}</h4>\n<div style=\"font-size:0.8rem; color:#64748b;\">\n<b>Onset Date:</b> {item[\"date_onset\"].strftime('%Y') if item.get(\"date_onset\") else \"Unknown\"}\n</div>\n{dispute_section}\n{evidence_section}\n</div>\"\"\",\n                    unsafe_allow_html=True\n                )\n                \n        with col_all_add:\n            st.markdown(\"#### Log Sensitivity or Diagnosis\")\n            with st.form(\"add_allergy_form\", clear_on_submit=True):\n                cond_name = st.text_input(\"Condition / Allergy Name\", placeholder=\"e.g. Penicillin Allergy / Asthma\")\n                category = st.selectbox(\"Category\", [\"Drug Allergy\", \"Food Allergy\", \"Environmental Allergy\", \"Chronic Illness\", \"Cardiovascular\", \"Other\"])\n                ep_status = st.selectbox(\"Epistemic / Verification Status\", [e.value for e in EpistemicStatus], format_func=lambda x: {\n                    \"clinically-verified\": \"Clinically Verified\",\n                    \"self-reported-unverified\": \"Self-Reported (Unverified)\",\n                    \"suspected-onset\": \"Suspected / Unconfirmed\",\n                    \"disputed-misdiagnosis\": \"Disputed / Potential Misdiagnosis\"\n                }[x])\n                dispute = st.text_area(\"Dispute / Conflict Rationale (If applicable)\", placeholder=\"Explain why this diagnosis might be incorrect, unconfirmed, or disputed...\")\n                onset = st.date_input(\"Onset Date (Approximate)\", value=date.today())\n                \n                # Mock Evidence Linking\n                st.markdown(\"##### Link Supporting Evidence\")\n                link_report = st.checkbox(\"Link to Laverty Pathology Report (Lipids)\", value=False)\n                \n                submitted_all = st.form_submit_button(\"\ud83d\udcbe Save Condition Node\")\n                if submitted_all and cond_name:\n                    evidence = [\"DiagnosticReport_Lipids\"] if link_report else []\n                    st.session_state.allergies_conditions.append({\n                        \"id\": f\"cond-{int(datetime.now().timestamp())}\",\n                        \"name\": cond_name,\n                        \"category\": category,\n                        \"epistemic_status\": EpistemicStatus(ep_status),\n                        \"dispute_rationale\": dispute if dispute else None,\n                        \"date_onset\": onset,\n                        \"linked_evidence_uris\": evidence\n                    })\n                    st.success(f\"Condition '{cond_name}' saved to Epistemic Vault.\")\n                    st.rerun()\n\n    # ------------------ TAB 4: SOCIAL FOUNDATIONS & WALKABOUT ------------------\n    with t_social:\n        st.markdown(\"### \ud83c\udfe1 Social Foundations & Walkabout Profile\")\n        st.write(\"Track aspects of dwelling safety, homelessness risk, subjective vs. objective safety indices, and resource readiness for nomadic living.\")\n\n        col_social_view, col_social_edit = st.columns([1, 1])\n\n        sf = st.session_state.social_foundations\n        wp = st.session_state.walkabout_profile\n\n        with col_social_view:\n            st.markdown(\"#### Current Social Foundations & Safety Audit\")\n            \n            # Subjective safety alert badge based on score\n            safety_score = sf[\"subjective_safety_score\"]\n            if safety_score <= 3:\n                safety_badge = \"<span style='background:#ef444422; color:#ef4444; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;'>\u26a0\ufe0f CRITICAL INSECURITY</span>\"\n            elif safety_score <= 6:\n                safety_badge = \"<span style='background:#f59e0b22; color:#f59e0b; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;'>\u26a0\ufe0f VULNERABLE / INSECURE</span>\"\n            else:\n                safety_badge = \"<span style='background:#10b98122; color:#10b981; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;'>\u2713 STABLE / SECURE</span>\"\n\n            # Format list of environmental hazards\n            hazards_html = \"\"\n            if sf[\"environmental_hazards\"]:\n                hazards_html = \" \".join([f\"<span style='background:rgba(0,0,0,0.04); color:#1f2937; padding:2px 6px; border-radius:4px; font-size:0.75rem; margin-right:4px;'>\u2623\ufe0f {h}</span>\" for h in sf[\"environmental_hazards\"]])\n            else:\n                hazards_html = \"<span style='color:#64748b; font-size:0.85rem;'>None reported</span>\"\n\n            # Trapped status\n            trapped_html = \"\"\n            if sf[\"is_trapped_at_location\"]:\n                trapped_html = f\"\"\"<div style=\"margin-top: 10px; padding: 10px; border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.04); font-size: 0.85rem; color: #ef4444;\">\n<b>Trapped at Dwelling:</b> {sf['trapped_reason'] or 'Yes, unable to leave due to financial or other factors.'}\n</div>\"\"\"\n\n            # Violence threats\n            violence_status = []\n            if sf[\"threat_of_violence\"]:\n                violence_status.append(\"Threats of violence / Coercive control\")\n            if sf[\"actual_violence_experienced\"]:\n                violence_status.append(\"Actual violence experienced\")\n            \n            violence_html = \"\"\n            if violence_status:\n                violence_html = f\"\"\"<div style=\"margin-top: 8px; padding: 10px; border-left: 3px solid #ef4444; background: rgba(239, 68, 68, 0.04); color: #ef4444; font-size: 0.85rem; font-weight: bold;\">\n\u26a0\ufe0f {', '.join(violence_status)}\n</div>\"\"\"\n\n            # Own behavior vs objective\n            behavior_html = \"\"\n            if sf[\"feels_unsafe_due_to_own_behaviors\"]:\n                behavior_html = f\"\"\"<div style=\"margin-top: 10px; padding: 10px; border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.04); font-size: 0.85rem; color: #1e3a8a;\">\n<b>Subjective Feeling Unsafe (Internal/Behavioral):</b> {sf['own_behaviors_detail'] or 'Indicated feeling unsafe relates to internal clinical status/behaviors.'}\n</div>\"\"\"\n\n            # Render Social Foundations Card\n            st.markdown(\n                f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid #f59e0b; padding: 20px; margin-bottom: 20px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;\">\n<h4 style=\"margin: 0; color:#b45309;\">\ud83c\udfe1 Dwelling & Environmental Safety</h4>\n{safety_badge}\n</div>\n<div style=\"font-size:0.92rem; color:#475569; display:grid; grid-template-columns: 1fr; gap: 8px;\">\n<div><b>Dwelling Status:</b> {str(sf['dwelling_type']).upper().replace('-', ' ')}</div>\n<div><b>Insecure Place of Sleep / Homelessness:</b> {'Yes \ud83d\udea8' if sf['homelessness_or_insecure_sleep'] else 'No'}</div>\n{f\"<div><b>Sleep Insecurity Reason:</b> {sf['sleep_insecurity_reason']}</div>\" if sf['sleep_insecurity_reason'] else \"\"}\n<div><b>Is 'Home' distinct from Dwelling / House:</b> {'Yes (deeply unhappy or unsafe in this structure)' if sf['is_home_distinct_from_dwelling'] else 'No'}</div>\n<div><b>Subjective Safety Score:</b> {sf['subjective_safety_score']}/10</div>\n</div>\n{violence_html}\n{trapped_html}\n{behavior_html}\n<div style=\"margin-top:12px;\">\n<div style=\"font-size:0.85rem; font-weight:bold; margin-bottom:4px; color:#475569;\">Environmental Hazards / Health Risks:</div>\n{hazards_html}\n</div>\n</div>\"\"\",\n                unsafe_allow_html=True\n            )\n\n            # Render Walkabout Profile Card\n            st.markdown(\"#### Nomadic Living & Walkabout Profile\")\n            \n            # Calculate resource readiness score\n            checked_resources = sum([wp[\"has_water\"], wp[\"has_food_storage\"], wp[\"has_hygiene_facilities\"], wp[\"has_power\"]])\n            readiness_percent = int((checked_resources / 4) * 100)\n            \n            if readiness_percent == 100:\n                readiness_color = \"#10b981\"\n                readiness_text = \"FULL RESOURCE READINESS\"\n            elif readiness_percent >= 50:\n                readiness_color = \"#f59e0b\"\n                readiness_text = \"PARTIAL RESOURCE SECURED\"\n            else:\n                readiness_color = \"#ef4444\"\n                readiness_text = \"CRITICAL RESOURCE DEFICIT\"\n\n            # Sleep Security level string formatting\n            sleep_sec_str = str(wp[\"sleep_security_level\"]).replace('-', ' ').upper()\n\n            st.markdown(\n                f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid #10b981; padding: 20px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;\">\n<h4 style=\"margin: 0; color:#0f766e;\">\u26fa Walkabout / Nomadic Profile</h4>\n<span style='background:{readiness_color}22; color:{readiness_color}; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;'>{readiness_text} ({readiness_percent}%)</span>\n</div>\n<div style=\"font-size:0.92rem; color:#475569; display:grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;\">\n<div><b>Mobile Shelter Type:</b> {wp['shelter_type']}</div>\n<div><b>Sleep Place Security Level:</b> {sleep_sec_str}</div>\n<div><b>Transit Frequency:</b> {wp['transit_frequency']}</div>\n<div><b>Transit Routing/Details:</b> {wp['transit_details'] or 'N/A'}</div>\n<div><b>Profile Notes:</b> {wp['notes'] or 'None'}</div>\n</div>\n\n<div style=\"font-size:0.85rem; font-weight:bold; margin-bottom:6px; color:#475569;\">Daily Resource Checklist:</div>\n<div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 8px;\">\n<div>{'\ud83d\udfe2' if wp['has_water'] else '\ud83d\udd34'} Potable Water Access</div>\n<div>{'\ud83d\udfe2' if wp['has_food_storage'] else '\ud83d\udd34'} Cold Food Storage</div>\n<div>{'\ud83d\udfe2' if wp['has_hygiene_facilities'] else '\ud83d\udd34'} Shower/Hygiene Facilities</div>\n<div>{'\ud83d\udfe2' if wp['has_power'] else '\ud83d\udd34'} Electric/Off-Grid Power</div>\n</div>\n</div>\"\"\",\n                unsafe_allow_html=True\n            )\n\n        with col_social_edit:\n            st.markdown(\"#### Log / Update Social & Walkabout Status\")\n            \n            # Edit Sub-Tabs for edit forms to keep the column clean\n            e_sf, e_wp = st.tabs([\"\ud83c\udfe1 Edit Dwelling Safety\", \"\u26fa Edit Walkabout Status\"])\n            \n            with e_sf:\n                with st.form(\"edit_social_foundations_form\"):\n                    dwell_opt = [\"fixed-house\", \"couch-surfing\", \"rough-sleeping\", \"mobile-home-van\", \"camping-tent\", \"other\"]\n                    \n                    # Convert to string to avoid comparison errors with Enum if stored as Enum\n                    curr_dwell = sf[\"dwelling_type\"]\n                    if hasattr(curr_dwell, \"value\"):\n                        curr_dwell = curr_dwell.value\n                    \n                    dwell_type_val = st.selectbox(\n                        \"Dwelling Type\", \n                        dwell_opt, \n                        index=dwell_opt.index(curr_dwell) if curr_dwell in dwell_opt else 0,\n                        format_func=lambda x: x.replace('-', ' ').title()\n                    )\n                    \n                    homeless_val = st.checkbox(\"Homelessness or Insecure Place of Sleep\", value=sf[\"homelessness_or_insecure_sleep\"])\n                    sleep_reason_val = st.text_input(\"Sleep Insecurity Reason\", value=sf[\"sleep_insecurity_reason\"] or \"\", placeholder=\"e.g. family separation, poverty\")\n                    \n                    st.markdown(\"---\")\n                    st.markdown(\"##### Threats & Violence Safety\")\n                    threat_val = st.checkbox(\"Threat of Violence / Coercive Control\", value=sf[\"threat_of_violence\"])\n                    violence_val = st.checkbox(\"Actual Violence Experienced\", value=sf[\"actual_violence_experienced\"])\n                    \n                    hazards_list = [\"Black Mould\", \"Dampness\", \"Insecure Lock\", \"Lack of Heating/Cooling\", \"Structural Defect\"]\n                    hazards_val = st.multiselect(\"Environmental Hazards / Health Hazards\", hazards_list, default=sf[\"environmental_hazards\"])\n                    \n                    st.markdown(\"---\")\n                    st.markdown(\"##### Subjective Safety & Trapped Status\")\n                    distinct_home_val = st.checkbox(\"The concept of 'home' is not the same as dwelling (e.g. trapped/unhappy)\", value=sf[\"is_home_distinct_from_dwelling\"])\n                    trapped_val = st.checkbox(\"Trapped at location / Unable to leave\", value=sf[\"is_trapped_at_location\"])\n                    trapped_reason_val = st.text_input(\"Reason Trapped\", value=sf[\"trapped_reason\"] or \"\")\n                    \n                    safety_score_val = st.slider(\"Subjective Safety Score (1 = Extremely Unsafe, 10 = Completely Safe)\", 1, 10, int(sf[\"subjective_safety_score\"]))\n                    \n                    st.markdown(\"---\")\n                    st.markdown(\"##### Behavioral / Clinical Safety\")\n                    behaviors_val = st.checkbox(\"Feels unsafe due to own behaviours / clinical status\", value=sf[\"feels_unsafe_due_to_own_behaviors\"])\n                    behaviors_desc_val = st.text_area(\"Detail of own behavior influence\", value=sf[\"own_behaviors_detail\"] or \"\", placeholder=\"Describe if mental health symptoms or internal episodes affect safety feelings...\")\n                    \n                    submitted_sf = st.form_submit_button(\"\ud83d\udcbe Save Dwelling & Safety Data\")\n                    if submitted_sf:\n                        # Instantiate Pydantic model for validation\n                        record = SocialFoundationsRecord(\n                            id=\"sf-record\",\n                            dwelling_type=DwellingType(dwell_type_val),\n                            homelessness_or_insecure_sleep=homeless_val,\n                            sleep_insecurity_reason=sleep_reason_val if sleep_reason_val else None,\n                            threat_of_violence=threat_val,\n                            actual_violence_experienced=violence_val,\n                            environmental_hazards=hazards_val,\n                            is_home_distinct_from_dwelling=distinct_home_val,\n                            is_trapped_at_location=trapped_val,\n                            trapped_reason=trapped_reason_val if trapped_reason_val else None,\n                            deeply_unhappy_or_threatened=threat_val or trapped_val,\n                            subjective_safety_score=safety_score_val,\n                            feels_unsafe_due_to_own_behaviors=behaviors_val,\n                            own_behaviors_detail=behaviors_desc_val if behaviors_desc_val else None\n                        )\n                        st.session_state.social_foundations = record.model_dump()\n                        st.success(\"Dwelling and safety audit updated.\")\n                        st.rerun()\n                        \n            with e_wp:\n                with st.form(\"edit_walkabout_profile_form\"):\n                    shelter_val = st.text_input(\"Mobile Shelter Type\", value=wp[\"shelter_type\"], placeholder=\"e.g. Van, Tent, Caravan, Swag\")\n                    \n                    sec_opts = [\"secure-campground\", \"public-parking-medium-risk\", \"unprotected-rough-camping-high-risk\"]\n                    curr_sec = wp[\"sleep_security_level\"]\n                    if hasattr(curr_sec, \"value\"):\n                        curr_sec = curr_sec.value\n                    sec_level_val = st.selectbox(\n                        \"Sleep Place Security Level\",\n                        sec_opts,\n                        index=sec_opts.index(curr_sec) if curr_sec in sec_opts else 0,\n                        format_func=lambda x: x.replace('-', ' ').title()\n                    )\n                    \n                    st.markdown(\"##### Daily Resource Readiness\")\n                    water_val = st.checkbox(\"Potable Water Access\", value=wp[\"has_water\"])\n                    food_val = st.checkbox(\"Cold Food Storage\", value=wp[\"has_food_storage\"])\n                    hygiene_val = st.checkbox(\"Hygiene & Shower Facilities\", value=wp[\"has_hygiene_facilities\"])\n                    power_val = st.checkbox(\"Electric / Off-Grid Power Support\", value=wp[\"has_power\"])\n                    \n                    st.markdown(\"##### Nomadic Movement\")\n                    transit_freq_val = st.text_input(\"Transit Frequency\", value=wp[\"transit_frequency\"], placeholder=\"e.g. Nomadic, Weekly, Daily\")\n                    transit_details_val = st.text_area(\"Transit Routing / Details\", value=wp[\"transit_details\"] or \"\")\n                    \n                    notes_val = st.text_area(\"Walkabout Profile Notes\", value=wp[\"notes\"] or \"\")\n                    \n                    submitted_wp = st.form_submit_button(\"\ud83d\udcbe Save Walkabout Profile\")\n                    if submitted_wp:\n                        # Instantiate Pydantic model for validation\n                        profile = WalkaboutProfile(\n                            id=\"wp-profile\",\n                            shelter_type=shelter_val,\n                            sleep_security_level=SleepSecurityLevel(sec_level_val),\n                            has_water=water_val,\n                            has_food_storage=food_val,\n                            has_hygiene_facilities=hygiene_val,\n                            has_power=power_val,\n                            transit_frequency=transit_freq_val,\n                            transit_details=transit_details_val if transit_details_val else None,\n                            notes=notes_val if notes_val else None\n                        )\n                        st.session_state.walkabout_profile = profile.model_dump()\n                        st.success(\"Walkabout profile updated.\")\n                        st.rerun()\n", "ui/tabs/proxy_sharing.py": "import streamlit as st\nimport textwrap\n\nfrom src.phr_models.proxy_consent import RelatedPerson, ProxyConsent, PrivacyMode, LegalBasis, ProxyRelationship\n\ndef render_proxy_sharing(dark_mode: bool):\n    st.markdown(\"## \ud83d\udee1\ufe0f Proxy Disclosures & Sharing Control\")\n    \n    st.markdown(\n        textwrap.dedent(\"\"\"\n        <div class=\"premium-card\" style=\"border-left: 5px solid #10b981; margin-bottom: 20px;\">\n            <h4 style=\"margin: 0; color: #10b981;\">\ud83d\udc65 Proxy Consent & Authority Engine</h4>\n            <p style=\"font-size: 0.9rem; color: #64748b; margin-top: 5px; margin-bottom: 0;\">\n                Manage carer, guardian, and nominated person authorizations aligned with My Health Record rules and the NSW Mental Health Act. Use the <b>Carer View Simulator</b> below to test data redaction in real time.\n            </p>\n        </div>\n        \"\"\"),\n        unsafe_allow_html=True\n    )\n    \n    st.markdown(\"### \ud83c\udfad Carer View Simulator\")\n    st.write(\"Simulate what a third-party (e.g. your doctor or carer) actually sees when they log in to view your health record. Data is dynamically redacted based on Privacy Mode A/B/C security labels.\")\n    \n    sim_role = st.selectbox(\n        \"Select Simulated View Role:\",\n        options=[\"Owner\", \"Doctor\", \"Carer\"],\n        format_func=lambda x: {\n            \"Owner\": \"\ud83d\udc51 Full Patient Owner (Full View: Mode A, B, C)\",\n            \"Doctor\": \"\ud83e\ude7a Doctor / GP (View: Mode A and B - Confidential & Clinical)\",\n            \"Carer\": \"\ud83d\udc65 Carer / Father (View: Mode C - Normal/Shared)\"\n        }[x],\n        key=\"sim_role_select\"\n    )\n    st.session_state.simulated_role = sim_role\n    \n    obs_all = st.session_state.get(\"psychiatric_observations\", [])\n    loc_all = st.session_state.get(\"location_events\", [])\n    med_all = st.session_state.get(\"medication_administrations\", [])\n    \n    def count_visible(dataset, role):\n        visible = 0\n        for item in dataset:\n            mode = item[\"privacy_mode\"]\n            if role == \"Owner\":\n                visible += 1\n            elif role == \"Doctor\":\n                if mode in [PrivacyMode.MODE_A_STRICT, PrivacyMode.MODE_B_PRIVILEGED]:\n                    visible += 1\n            elif role == \"Carer\":\n                if mode == PrivacyMode.MODE_C_SHARED:\n                    visible += 1\n        return visible\n    \n    v_obs = count_visible(obs_all, sim_role)\n    v_loc = count_visible(loc_all, sim_role)\n    v_med = count_visible(med_all, sim_role)\n    \n    c1, c2, c3 = st.columns(3)\n    c1.metric(\"Visible Psychiatry Records\", f\"{v_obs} / {len(obs_all)}\")\n    c2.metric(\"Visible Location Logs\", f\"{v_loc} / {len(loc_all)}\")\n    c3.metric(\"Visible Medication Records\", f\"{v_med} / {len(med_all)}\")\n    \n    st.divider()\n    \n    col1, col2 = st.columns([1, 1])\n    \n    with col1:\n        st.markdown(\"### \ud83d\udc65 Registered Related Persons (Proxies)\")\n        for rp in st.session_state.related_persons:\n            st.markdown(\n                textwrap.dedent(f\"\"\"\n                <div class=\"premium-card\" style=\"border-left: 3px solid #3b82f6; padding: 12px; margin-bottom: 10px;\">\n                    <strong>{rp.description}</strong>\n                    <div style=\"font-size: 0.75rem; color: #94a3b8; margin-top: 4px;\">\n                        Relationship: {rp.relationship.name} | ID: <code>{rp.id}</code> | Anonymous for Safety: {'Yes \ud83d\udd12' if rp.is_anonymous else 'No'}\n                    </div>\n                </div>\n                \"\"\"),\n                unsafe_allow_html=True\n            )\n            \n        with st.expander(\"\u2795 Register New Related Person\"):\n            with st.form(\"new_rp_form\", clear_on_submit=True):\n                desc = st.text_input(\"Name & Title / Description\", placeholder=\"e.g. John Doe (Father)\")\n                rel = st.selectbox(\"Relationship Type\", options=[ProxyRelationship.PARENT, ProxyRelationship.CARER, ProxyRelationship.GUARDIAN, ProxyRelationship.PARTNER])\n                anon = st.checkbox(\"Keep Anonymous (for safety planning)\", value=False)\n                \n                submitted = st.form_submit_button(\"Register Proxy\")\n                if submitted and desc:\n                    new_rp = RelatedPerson(\n                        id=f\"rp-{len(st.session_state.related_persons)+1}\",\n                        patient_id=\"patient-self\",\n                        relationship=rel,\n                        is_anonymous=anon,\n                        description=desc\n                    )\n                    st.session_state.related_persons.append(new_rp)\n                    st.success(\"Related Person registered.\")\n                    st.rerun()\n                    \n    with col2:\n        st.markdown(\"### \ud83d\udcdc Active Proxy Consents & Legal Basis\")\n        for pc in st.session_state.proxy_consents:\n            proxy_desc = \"Unknown Proxy\"\n            for rp in st.session_state.related_persons:\n                if rp.id == pc.proxy_id:\n                    proxy_desc = rp.description\n                    break\n            st.markdown(\n                textwrap.dedent(f\"\"\"\n                <div class=\"premium-card\" style=\"border-left: 3px solid #10b981; padding: 12px; margin-bottom: 10px;\">\n                    <strong>Access: {proxy_desc}</strong>\n                    <div style=\"font-size: 0.75rem; color: #94a3b8; margin: 4px 0;\">\n                        Legal Basis: {pc.legal_basis.value} | Sharing Mode: {pc.privacy_mode.name}\n                    </div>\n                    <div style=\"font-size: 0.7rem; color: #ef4444;\">\n                        {'\u26a0\ufe0f Strict Audit Trails Silenced (Safety Planning Active)' if pc.audit_silenced else '\u2713 Standard Security Audit Logging Active'}\n                    </div>\n                </div>\n                \"\"\"),\n                unsafe_allow_html=True\n            )\n            \n        with st.expander(\"\u2795 Add Consent Authorization\"):\n            with st.form(\"new_consent_form\", clear_on_submit=True):\n                proxies = {p.description: p.id for p in st.session_state.related_persons}\n                sel_p = st.selectbox(\"Authorize Proxy\", options=list(proxies.keys()))\n                basis = st.selectbox(\"Legal Authorization Basis\", options=[LegalBasis.EXPLICIT_CONSENT, LegalBasis.GUARDIAN_AUTHORITY, LegalBasis.MHA_NOMINATED, LegalBasis.SAFETY_OVERRIDE])\n                mode = st.selectbox(\"Maximum Permitted Privacy Level\", options=[PrivacyMode.MODE_A_STRICT, PrivacyMode.MODE_B_PRIVILEGED, PrivacyMode.MODE_C_SHARED])\n                silence_audit = st.checkbox(\"Silence Audits for Safety\", value=False)\n                \n                submitted = st.form_submit_button(\"Grant Authorization\")\n                if submitted:\n                    new_pc = ProxyConsent(\n                        id=f\"consent-{len(st.session_state.proxy_consents)+1}\",\n                        patient_id=\"patient-self\",\n                        proxy_id=proxies[sel_p],\n                        legal_basis=basis,\n                        privacy_mode=mode,\n                        audit_silenced=silence_audit\n                    )\n                    st.session_state.proxy_consents.append(new_pc)\n                    st.success(\"Proxy consent authorization granted.\")\n                    st.rerun()\n", "ui/tabs/psychology.py": "\"\"\"Psychology UI tab \u2013 Therapy, Formulation, Sub Rosa & Timeline.\n\nRenders the top-level **\ud83e\uddea Psychology** page with four sub-tabs:\n1. Therapy & Formulation\n2. Sub Rosa (Confessional)\n3. Semantic Tripwires\n4. Psychological Timeline\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport uuid\nfrom datetime import datetime, date, timedelta\n\nimport streamlit as st\n\nfrom src.phr_models.psychology import (\n    TherapyModality,\n    AttachmentStyle,\n    SubRosaCategory,\n)\n\n\n# ---------------------------------------------------------------------------\n# Helpers\n# ---------------------------------------------------------------------------\n\ndef _card(title: str, body: str, accent: str = \"#8b5cf6\") -> str:\n    return f\"\"\"\n<div class=\"premium-card\" style=\"border-left: 5px solid {accent}; margin-bottom: 16px;\">\n<h4 style=\"margin: 0; color: {accent};\">{title}</h4>\n<div style=\"font-size: 0.88rem; color: #94a3b8; margin-top: 6px;\">{body}</div>\n</div>\"\"\"\n\n\nSUB_ROSA_COLORS = {\n    SubRosaCategory.SUBSTANCE_USE: \"#ef4444\",\n    SubRosaCategory.SEXUAL_HEALTH: \"#ec4899\",\n    SubRosaCategory.ENVIRONMENTAL_EXPOSURE: \"#f59e0b\",\n    SubRosaCategory.DOMESTIC_SITUATION: \"#dc2626\",\n    SubRosaCategory.PROFESSIONAL_CONFLICT: \"#6366f1\",\n    SubRosaCategory.LEGAL_ENTANGLEMENT: \"#7c3aed\",\n    SubRosaCategory.FINANCIAL_DURESS: \"#0ea5e9\",\n    SubRosaCategory.DEVELOPMENTAL_TRAUMA: \"#e11d48\",\n    SubRosaCategory.OTHER: \"#64748b\",\n}\n\n\n# ---------------------------------------------------------------------------\n# Session state initialisation\n# ---------------------------------------------------------------------------\n\ndef _init_state():\n    if \"therapy_sessions\" not in st.session_state:\n        now = datetime.now()\n        st.session_state.therapy_sessions = [\n            {\n                \"id\": \"ts-demo-1\",\n                \"date\": now - timedelta(days=14),\n                \"modality\": TherapyModality.CBT.value,\n                \"therapist\": \"Dr. Amara Chen (Clinical Psychologist)\",\n                \"summary\": \"Explored cognitive distortions around workplace conflict. \"\n                           \"Identified catastrophising pattern linked to childhood authority dynamics.\",\n                \"homework\": \"Daily thought record \u2013 3 column format\",\n                \"mood_pre\": 3,\n                \"mood_post\": 6,\n            },\n            {\n                \"id\": \"ts-demo-2\",\n                \"date\": now - timedelta(days=7),\n                \"modality\": TherapyModality.EMDR.value,\n                \"therapist\": \"Dr. Amara Chen (Clinical Psychologist)\",\n                \"summary\": \"Bilateral stimulation targeting index trauma memory (age 12). \"\n                           \"SUD score reduced from 8 to 4. Session emotionally intense but contained.\",\n                \"homework\": \"Safe-place visualisation before sleep\",\n                \"mood_pre\": 4,\n                \"mood_post\": 5,\n            },\n        ]\n\n    if \"psych_formulation\" not in st.session_state:\n        st.session_state.psych_formulation = {\n            \"presenting\": [\"Persistent anxiety in professional settings\", \"Difficulty trusting authority figures\"],\n            \"predisposing\": [\"Childhood emotional neglect\", \"Early parentification\"],\n            \"precipitating\": [\"Workplace restructure (March 2026)\", \"Relationship breakdown\"],\n            \"perpetuating\": [\"Avoidance of difficult conversations\", \"Social isolation\", \"Poor sleep hygiene\"],\n            \"protective\": [\"Strong intellectual capability\", \"Engaged with therapy\", \"Creative outlets (music)\"],\n            \"narrative\": \"\",\n        }\n\n    if \"attachment_record\" not in st.session_state:\n        st.session_state.attachment_record = {\n            \"style\": AttachmentStyle.FEARFUL_AVOIDANT.value,\n            \"confidence\": \"Medium\",\n            \"assessor\": \"Self + Clinician-Guided\",\n            \"notes\": \"Pattern of approach-avoidance in close relationships. Hypervigilance around perceived rejection.\",\n        }\n\n    if \"sub_rosa_records\" not in st.session_state:\n        st.session_state.sub_rosa_records = []\n\n    if \"tripwire_simulations\" not in st.session_state:\n        st.session_state.tripwire_simulations = []\n\n\n# ---------------------------------------------------------------------------\n# Main render\n# ---------------------------------------------------------------------------\n\ndef render_psychology(dark_mode: bool):\n    _init_state()\n\n    st.markdown(\"## \ud83e\uddea Psychology\")\n    st.markdown(\n        _card(\n            \"\ud83e\uddea Clinical Psychology Vault\",\n            \"Therapy session tracking, psychological formulation, attachment mapping, \"\n            \"and the <b>Sub Rosa</b> confessional for clinically-relevant sensitive records. \"\n            \"All data defaults to <b>Mode A (Strict Privacy)</b> and is never shared without explicit consent.\",\n            \"#8b5cf6\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    tab_therapy, tab_subrosa, tab_tripwire, tab_timeline = st.tabs([\n        \"\ud83d\udde3\ufe0f Therapy & Formulation\",\n        \"\ud83c\udf39 Sub Rosa (Confessional)\",\n        \"\u26a1 Semantic Tripwires\",\n        \"\ud83d\udcca Psychological Timeline\",\n    ])\n\n    # ==================================================================\n    # TAB 1 \u2013 THERAPY & FORMULATION\n    # ==================================================================\n    with tab_therapy:\n        _render_therapy_tab(dark_mode)\n\n    # ==================================================================\n    # TAB 2 \u2013 SUB ROSA\n    # ==================================================================\n    with tab_subrosa:\n        _render_subrosa_tab(dark_mode)\n\n    # ==================================================================\n    # TAB 3 \u2013 SEMANTIC TRIPWIRES\n    # ==================================================================\n    with tab_tripwire:\n        _render_tripwire_tab(dark_mode)\n\n    # ==================================================================\n    # TAB 4 \u2013 PSYCHOLOGICAL TIMELINE\n    # ==================================================================\n    with tab_timeline:\n        _render_timeline_tab(dark_mode)\n\n\n# ---------------------------------------------------------------------------\n# TAB 1 \u2013 Therapy & Formulation\n# ---------------------------------------------------------------------------\n\ndef _render_therapy_tab(dark_mode: bool):\n    col_form, col_history = st.columns([1, 1])\n\n    # ---- Left: Log session + Formulation + Attachment ----\n    with col_form:\n        st.markdown(\"### \ud83d\udcdd Log Therapy Session\")\n        with st.form(\"therapy_session_form\", clear_on_submit=True):\n            modality = st.selectbox(\"Modality\", [m.value for m in TherapyModality])\n            therapist = st.text_input(\"Therapist / Psychologist\", placeholder=\"e.g., Dr. Amara Chen\")\n            summary = st.text_area(\"Session Summary\", placeholder=\"Key themes, insights, breakthroughs...\")\n            homework = st.text_input(\"Homework / Between-Session Tasks (optional)\")\n            sc1, sc2 = st.columns(2)\n            with sc1:\n                mood_pre = st.slider(\"Mood Before (0-10)\", 0, 10, 5)\n            with sc2:\n                mood_post = st.slider(\"Mood After (0-10)\", 0, 10, 5)\n\n            if st.form_submit_button(\"\ud83d\udcbe Save Session Note\", type=\"primary\") and summary:\n                st.session_state.therapy_sessions.append({\n                    \"id\": f\"ts-{uuid.uuid4().hex[:8]}\",\n                    \"date\": datetime.now(),\n                    \"modality\": modality,\n                    \"therapist\": therapist,\n                    \"summary\": summary,\n                    \"homework\": homework,\n                    \"mood_pre\": mood_pre,\n                    \"mood_post\": mood_post,\n                })\n                st.success(\"Session note saved.\")\n                st.rerun()\n\n        # ---- Psychological Formulation (5 Ps) ----\n        st.markdown(\"### \ud83e\udde9 Psychological Formulation (5 Ps)\")\n        form = st.session_state.psych_formulation\n\n        ps_labels = [\n            (\"presenting\", \"Presenting Problems\", \"#ef4444\"),\n            (\"predisposing\", \"Predisposing Factors\", \"#f59e0b\"),\n            (\"precipitating\", \"Precipitating Factors\", \"#3b82f6\"),\n            (\"perpetuating\", \"Perpetuating Factors\", \"#e11d48\"),\n            (\"protective\", \"Protective Factors\", \"#10b981\"),\n        ]\n        for key, label, color in ps_labels:\n            items = form.get(key, [])\n            st.markdown(\n                f\"<div style='margin:8px 0 4px 0;'>\"\n                f\"<span style='font-size:0.72rem; font-weight:700; text-transform:uppercase; \"\n                f\"letter-spacing:0.05em; color:{color};'>{label}</span></div>\",\n                unsafe_allow_html=True,\n            )\n            for item in items:\n                st.markdown(f\"<div style='font-size:0.85rem; padding:2px 0 2px 12px; \"\n                            f\"border-left:3px solid {color}; margin:3px 0;'>{item}</div>\",\n                            unsafe_allow_html=True)\n\n        with st.expander(\"\u270f\ufe0f Edit Formulation\"):\n            with st.form(\"edit_formulation\", clear_on_submit=False):\n                for key, label, _ in ps_labels:\n                    current = \"\\n\".join(form.get(key, []))\n                    new_val = st.text_area(label, value=current, height=80, key=f\"form_{key}\")\n                    form[key] = [line.strip() for line in new_val.split(\"\\n\") if line.strip()]\n                if st.form_submit_button(\"Save Formulation\"):\n                    st.session_state.psych_formulation = form\n                    st.success(\"Formulation updated.\")\n                    st.rerun()\n\n        # ---- Attachment Style ----\n        st.markdown(\"### \ud83d\udd17 Attachment Style\")\n        att = st.session_state.attachment_record\n        att_colors = {\n            AttachmentStyle.SECURE.value: \"#10b981\",\n            AttachmentStyle.ANXIOUS_PREOCCUPIED.value: \"#f59e0b\",\n            AttachmentStyle.DISMISSIVE_AVOIDANT.value: \"#3b82f6\",\n            AttachmentStyle.FEARFUL_AVOIDANT.value: \"#e11d48\",\n            AttachmentStyle.DISORGANISED.value: \"#7c3aed\",\n        }\n        att_color = att_colors.get(att[\"style\"], \"#64748b\")\n        st.markdown(\n            f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid {att_color}; padding: 14px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center;\">\n<span style=\"font-size:1rem; font-weight:700; color:{att_color};\">{att['style'].replace('-', ' ').title()}</span>\n<span style=\"font-size:0.72rem; background:{att_color}1a; color:{att_color}; padding:2px 8px; border-radius:4px;\">\nConfidence: {att['confidence']}</span>\n</div>\n<p style=\"font-size:0.82rem; color:#94a3b8; margin:6px 0 0 0;\">{att.get('notes', '')}</p>\n<p style=\"font-size:0.72rem; color:#64748b; margin:4px 0 0 0;\">Assessor: {att['assessor']}</p>\n</div>\"\"\",\n            unsafe_allow_html=True,\n        )\n\n    # ---- Right: Session history ----\n    with col_history:\n        st.markdown(\"### \ud83d\udccb Session History\")\n        sessions = st.session_state.therapy_sessions\n        if not sessions:\n            st.info(\"No therapy sessions logged yet.\")\n        else:\n            for s in reversed(sessions):\n                dt = s[\"date\"]\n                date_str = dt.strftime(\"%b %d, %Y %H:%M\") if isinstance(dt, datetime) else str(dt)\n                delta = s[\"mood_post\"] - s[\"mood_pre\"]\n                delta_icon = \"\ud83d\udcc8\" if delta > 0 else (\"\ud83d\udcc9\" if delta < 0 else \"\u27a1\ufe0f\")\n                delta_color = \"#10b981\" if delta > 0 else (\"#ef4444\" if delta < 0 else \"#64748b\")\n\n                st.markdown(\n                    f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid #8b5cf6; padding: 14px; margin-bottom: 10px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center;\">\n<span style=\"font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#8b5cf6;\">{s['modality']}</span>\n<span style=\"font-size:0.72rem; color:#64748b;\">{date_str}</span>\n</div>\n<p style=\"font-size:0.85rem; color:#cbd5e1; margin:8px 0 4px 0;\">{s['summary']}</p>\n<div style=\"display:flex; gap:16px; font-size:0.78rem; color:#94a3b8; margin-top:6px;\">\n<span>Mood: {s['mood_pre']} \u2192 {s['mood_post']} <span style=\"color:{delta_color};\">{delta_icon} {delta:+d}</span></span>\n{'<span>\ud83d\udccc ' + s['homework'] + '</span>' if s.get('homework') else ''}\n</div>\n<p style=\"font-size:0.72rem; color:#64748b; margin:4px 0 0 0;\">\ud83e\ude7a {s.get('therapist', 'Unspecified')}</p>\n</div>\"\"\",\n                    unsafe_allow_html=True,\n                )\n\n\n# ---------------------------------------------------------------------------\n# TAB 2 \u2013 Sub Rosa (Confessional)\n# ---------------------------------------------------------------------------\n\ndef _render_subrosa_tab(dark_mode: bool):\n    st.markdown(\"### \ud83c\udf39 Sub Rosa \u2013 Confessional Vault\")\n    st.markdown(\n        _card(\n            \"\ud83c\udf39 The Veiled Graph\",\n            \"Record clinically-relevant but socially-sensitive information that must remain \"\n            \"<b>computationally active</b> (can trigger drug interaction warnings, contraindication \"\n            \"alerts) yet <b>socially invisible</b> to external agents. \"\n            \"Each record is SHA-256 hashed for immutable provenance anchoring.\",\n            \"#e11d48\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    col_entry, col_records = st.columns([1, 1])\n\n    with col_entry:\n        st.markdown(\"#### New Sub Rosa Entry\")\n        with st.form(\"subrosa_form\", clear_on_submit=True):\n            category = st.selectbox(\n                \"Category\",\n                [c.value for c in SubRosaCategory],\n                help=\"Choose the domain of sensitivity\",\n            )\n            narrative = st.text_area(\n                \"Narrative (encrypted at rest)\",\n                placeholder=\"Describe the situation, substance, event, or exposure...\",\n                height=120,\n            )\n            clinical_relevance = st.text_area(\n                \"Clinical Relevance\",\n                placeholder=\"Why does this matter medically? E.g., 'Cocaine use contraindicates beta-blockers'\",\n                height=80,\n            )\n            semantic_tags = st.text_input(\n                \"Semantic Tags (comma-separated)\",\n                placeholder=\"e.g., cardiovascular, hepatotoxicity, STI-screening\",\n            )\n            tripwire_rules = st.text_input(\n                \"Tripwire Query Patterns (comma-separated)\",\n                placeholder=\"e.g., prescribe:beta-blocker, test:liver-function\",\n            )\n            is_hypothesis = st.checkbox(\n                \"This is a hypothesis / suspicion (not a confirmed fact)\",\n                value=False,\n            )\n\n            submitted = st.form_submit_button(\"\ud83d\udd12 Seal & Anchor Record\", type=\"primary\")\n\n        if submitted and narrative:\n            ts = datetime.now()\n            record_id = f\"sr-{uuid.uuid4().hex[:8]}\"\n            payload = f\"{record_id}|{category}|{narrative}|{ts.isoformat()}\"\n            prov_hash = hashlib.sha256(payload.encode()).hexdigest()\n\n            tags = [t.strip() for t in semantic_tags.split(\",\") if t.strip()] if semantic_tags else []\n            rules = [r.strip() for r in tripwire_rules.split(\",\") if r.strip()] if tripwire_rules else []\n\n            new_record = {\n                \"id\": record_id,\n                \"timestamp\": ts,\n                \"category\": category,\n                \"narrative\": narrative,\n                \"clinical_relevance\": clinical_relevance,\n                \"semantic_tags\": tags,\n                \"tripwire_rules\": rules,\n                \"hypothesis_flag\": is_hypothesis,\n                \"provenance_hash\": prov_hash,\n            }\n            st.session_state.sub_rosa_records.append(new_record)\n            st.success(f\"\u2705 Sub Rosa record sealed. Provenance hash: `sha256:{prov_hash[:16]}\u2026`\")\n            st.rerun()\n\n    with col_records:\n        st.markdown(\"#### Sealed Records\")\n        records = st.session_state.sub_rosa_records\n        if not records:\n            st.markdown(\n                _card(\n                    \"No records yet\",\n                    \"Use the form on the left to create your first Sub Rosa entry. \"\n                    \"Records are stored locally and never transmitted without your explicit consent.\",\n                    \"#475569\",\n                ),\n                unsafe_allow_html=True,\n            )\n        else:\n            for rec in reversed(records):\n                cat_enum = SubRosaCategory(rec[\"category\"])\n                accent = SUB_ROSA_COLORS.get(cat_enum, \"#64748b\")\n                hyp_badge = ('<span style=\"font-size:0.65rem; background:#f59e0b22; color:#f59e0b; '\n                             'padding:1px 6px; border-radius:3px; margin-left:6px;\">HYPOTHESIS</span>'\n                             if rec.get(\"hypothesis_flag\") else \"\")\n                tripwire_count = len(rec.get(\"tripwire_rules\", []))\n                tripwire_badge = (f'<span style=\"font-size:0.65rem; background:#ef444422; color:#ef4444; '\n                                  f'padding:1px 6px; border-radius:3px; margin-left:6px;\">'\n                                  f'\u26a1 {tripwire_count} tripwire(s)</span>' if tripwire_count else \"\")\n\n                ts = rec[\"timestamp\"]\n                ts_str = ts.strftime(\"%b %d, %Y %H:%M\") if isinstance(ts, datetime) else str(ts)\n\n                st.markdown(\n                    f\"\"\"<div class=\"premium-card\" style=\"border-left: 4px solid {accent}; padding: 14px; margin-bottom: 10px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;\">\n<span style=\"font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:{accent};\">{rec['category']}</span>\n<span style=\"font-size:0.68rem; color:#64748b;\">{ts_str}{hyp_badge}{tripwire_badge}</span>\n</div>\n<p style=\"font-size:0.85rem; color:#cbd5e1; margin:8px 0 4px 0;\">{rec['narrative']}</p>\n{'<p style=\"font-size:0.78rem; color:#94a3b8; margin:4px 0;\"><b>Clinical:</b> ' + rec['clinical_relevance'] + '</p>' if rec.get('clinical_relevance') else ''}\n{'<p style=\"font-size:0.72rem; color:#64748b; margin:2px 0;\">Tags: ' + ', '.join(rec['semantic_tags']) + '</p>' if rec.get('semantic_tags') else ''}\n<div style=\"font-family:monospace; font-size:0.62rem; color:#a855f7; margin-top:6px;\">Provenance: sha256:{rec['provenance_hash']}</div>\n</div>\"\"\",\n                    unsafe_allow_html=True,\n                )\n\n\n# ---------------------------------------------------------------------------\n# TAB 3 \u2013 Semantic Tripwires\n# ---------------------------------------------------------------------------\n\ndef _render_tripwire_tab(dark_mode: bool):\n    st.markdown(\"### \u26a1 Semantic Tripwires\")\n    st.markdown(\n        _card(\n            \"\u26a1 Opaque Collision Detection\",\n            \"Semantic Tripwires intercept external queries that would produce unsafe results \"\n            \"due to hidden Sub Rosa records. The system alerts you without revealing the secret itself. \"\n            \"For full threat analysis, access the <b>Synthesis Engine</b> in Sanctuary Mode.\",\n            \"#f43f5e\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n    # ---- Active tripwire rules from Sub Rosa records ----\n    st.markdown(\"#### \ud83d\udd78\ufe0f Active Tripwire Rules\")\n    records = st.session_state.sub_rosa_records\n    active_rules = []\n    for rec in records:\n        for rule in rec.get(\"tripwire_rules\", []):\n            active_rules.append({\n                \"rule\": rule,\n                \"source_category\": rec[\"category\"],\n                \"source_id\": rec[\"id\"],\n            })\n\n    if not active_rules:\n        st.info(\"No tripwire rules defined. Add tripwire query patterns when creating Sub Rosa records.\")\n    else:\n        for r in active_rules:\n            cat_enum = SubRosaCategory(r[\"source_category\"])\n            accent = SUB_ROSA_COLORS.get(cat_enum, \"#64748b\")\n            st.markdown(\n                f\"\"\"<div class=\"premium-card\" style=\"border-left: 3px solid {accent}; padding: 10px; margin-bottom: 8px;\">\n<div style=\"display:flex; justify-content:space-between; align-items:center;\">\n<code style=\"font-size:0.85rem; color:#ef4444;\">{r['rule']}</code>\n<span style=\"font-size:0.65rem; color:{accent}; text-transform:uppercase;\">{r['source_category']}</span>\n</div>\n<p style=\"font-size:0.7rem; color:#64748b; margin:4px 0 0 0;\">Source: {r['source_id']}</p>\n</div>\"\"\",\n                unsafe_allow_html=True,\n            )\n\n    st.divider()\n\n    # ---- Collision Simulator ----\n    st.markdown(\"#### \ud83d\udd2c Collision Simulator\")\n    st.markdown(\n        \"<p style='font-size:0.85rem; color:#94a3b8;'>\"\n        \"Test what would happen if an external agent (doctor, pharmacist, insurer) \"\n        \"submitted a specific query to your vault.</p>\",\n        unsafe_allow_html=True,\n    )\n\n    with st.form(\"collision_sim_form\"):\n        sim_query = st.text_input(\n            \"Simulated External Query\",\n            placeholder=\"e.g., 'Prescribe propranolol (beta-blocker)' or 'Request full substance history'\",\n        )\n        sim_agent = st.text_input(\n            \"Requesting Agent\",\n            placeholder=\"e.g., 'Dr. Sarah Jenkins (GP)' or 'Insurance Assessor'\",\n        )\n        run_sim = st.form_submit_button(\"\u26a1 Run Collision Check\")\n\n    if run_sim and sim_query:\n        # Check against active tripwire rules\n        collisions = []\n        for rec in records:\n            for rule in rec.get(\"tripwire_rules\", []):\n                # Simple substring match for demo\n                if any(keyword in sim_query.lower() for keyword in rule.lower().split(\":\")):\n                    collisions.append({\n                        \"rule\": rule,\n                        \"category\": rec[\"category\"],\n                        \"clinical_relevance\": rec.get(\"clinical_relevance\", \"\"),\n                    })\n\n        if collisions:\n            st.markdown(\n                f\"\"\"<div class=\"premium-card\" style=\"border-left: 5px solid #ef4444; background: rgba(239, 68, 68, 0.04); padding: 16px;\">\n<h4 style=\"margin: 0; color: #ef4444;\">\ud83d\udea8 OPAQUE COLLISION DETECTED</h4>\n<p style=\"font-size: 0.9rem; color: #ef4444; margin-top: 6px;\">\n<b>Agent:</b> {sim_agent or 'Unknown'}<br>\n<b>Query:</b> {sim_query}<br>\n<b>Collisions:</b> {len(collisions)} Veiled Assertion(s) triggered<br>\n</p>\n<p style=\"font-size:0.85rem; color:#f87171; margin-top:8px;\">\n<b>System Response to Agent:</b> \"Warning: Query has triggered an Opaque Collision within the user's Veiled Graph.\nThe logical conclusion regarding this query cannot be guaranteed safe without user intervention.\"\n</p>\n</div>\"\"\",\n                unsafe_allow_html=True,\n            )\n            for c in collisions:\n                accent = SUB_ROSA_COLORS.get(SubRosaCategory(c[\"category\"]), \"#64748b\")\n                st.markdown(\n                    f\"\"\"<div style=\"border-left:3px solid {accent}; padding:8px 12px; margin:6px 0; font-size:0.82rem;\">\n<b>Rule:</b> <code>{c['rule']}</code> |\n<b>Domain:</b> <span style=\"color:{accent};\">{c['category']}</span><br>\n<b>Clinical Impact:</b> {c['clinical_relevance'] or 'Not specified'}\n</div>\"\"\",\n                    unsafe_allow_html=True,\n                )\n        else:\n            st.markdown(\n                \"\"\"<div class=\"premium-card\" style=\"border-left: 5px solid #10b981; padding: 16px;\">\n<h4 style=\"margin: 0; color: #10b981;\">\u2705 No Collisions Detected</h4>\n<p style=\"font-size: 0.85rem; color: #94a3b8; margin-top: 6px;\">\nThis query does not intersect with any active Veiled Assertions. The standard response can be returned safely.\n</p>\n</div>\"\"\",\n                unsafe_allow_html=True,\n            )\n\n    st.divider()\n    st.markdown(\"#### \ud83e\udd2b Full Threat Analysis\")\n    st.markdown(\n        _card(\n            \"\ud83d\udd17 Sanctuary Mode Integration\",\n            \"For full Synthesis Engine access (Contradiction Audits, Incoherence Reports, \"\n            \"Sentinel Rulesets, Evidentiary Export, and Contingency Protocols), \"\n            \"unlock <b>Sanctuary Mode</b> from the sidebar.\",\n            \"#a855f7\",\n        ),\n        unsafe_allow_html=True,\n    )\n\n\n# ---------------------------------------------------------------------------\n# TAB 4 \u2013 Psychological Timeline\n# ---------------------------------------------------------------------------\n\ndef _render_timeline_tab(dark_mode: bool):\n    st.markdown(\"### \ud83d\udcca Psychological Timeline\")\n\n    sessions = st.session_state.therapy_sessions\n    sub_rosa = st.session_state.sub_rosa_records\n\n    if not sessions and not sub_rosa: py": "from .styling import (\n    CLINICAL_HIGHLIGHT_PATTERNS,\n    HEALTH_COLORS,\n    highlight_turtle_clinical,\n    inject_css,\n)\nfrom .data_access import cached_load, cached_transform, load_dataset_mappings\nfrom .analytics import extract_timeline_events, get_dashboard_metrics\nfrom .plotting import plot_dataset_chart\nfrom .selectors import find_df_by_datatype, find_df_by_keyword\nfrom .mock_data import init_mock_data\n\n__all__ = [\n    \"HEALTH_COLORS\",\n    \"CLINICAL_HIGHLIGHT_PATTERNS\",\n    \"inject_css\",\n    \"highlight_turtle_clinical\",\n    \"cached_load\",\n    \"cached_transform\",\n    \"load_dataset_mappings\",\n    \"get_dashboard_metrics\",\n    \"extract_timeline_events\",\n    \"plot_dataset_chart\",\n    \"find_df_by_keyword\",\n    \"find_df_by_datatype\",\n    \"init_mock_data\",\n]", "src/exporters.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"Export RDF to Solid-style pod folders (Turtle + JSON-LD).\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom datetime import datetime\nfrom pathlib import Path\nfrom typing import Any\n\nfrom rdflib import Graph\nimport json\n\nfrom src.rdf_transformer import graph_to_jsonld\n\n\ndef _month_key_from_graph(graph: Graph) -> str:\n    \"\"\"Pick YYYY-MM from first schema:startDate literal in graph.\"\"\"\n    for _, _, lit in graph.triples((None, None, None)):\n        if hasattr(lit, \"toPython\") and isinstance(lit.toPython(), datetime):\n            return lit.toPython().strftime(\"%Y-%m\")\n        s = str(lit)\n        m = re.match(r\"(\\d{4}-\\d{2})\", s)\n        if m:\n            return m.group(1)\n    return datetime.now().strftime(\"%Y-%m\")\n\n\ndef _slug_from_data_type(data_type: str) -> str:\n    \"\"\"com.samsung.health.weight -> weight\"\"\"\n    parts = data_type.split(\".\")\n    return parts[-1] if parts else \"health\"\n\n\ndef export_to_solid(\n    graphs: dict[str, Graph] | Graph,\n    output_folder: str | Path,\n    *,\n    also_jsonld: bool = True,\n) -> dict[str, list[Path]]:\n    \"\"\"\n    Write Solid-style folder layout:\n      /health/{slug}/{YYYY-MM}.ttl\n      /health/{slug}/{YYYY-MM}.jsonld\n    \"\"\"\n    out_root = Path(output_folder).resolve()\n    written: dict[str, list[Path]] = {\"ttl\": [], \"jsonld\": []}\n\n    if isinstance(graphs, Graph):\n        graphs = {\"merged\": graphs}\n\n    for data_type, graph in graphs.items():\n        if len(graph) == 0:\n            continue\n\n        slug = _slug_from_data_type(data_type)\n        month = _month_key_from_graph(graph)\n        dest_dir = out_root / \"health\" / slug\n        dest_dir.mkdir(parents=True, exist_ok=True)\n\n        ttl_path = dest_dir / f\"{month}.ttl\"\n        graph.serialize(destination=str(ttl_path), format=\"turtle\")\n        written[\"ttl\"].append(ttl_path)\n\n        if also_jsonld:\n            jsonld_path = dest_dir / f\"{month}.jsonld\"\n            with jsonld_path.open(\"w\", encoding=\"utf-8\") as f:\n                f.write(graph_to_jsonld(graph))\n            written[\"jsonld\"].append(jsonld_path)\n\n    return written\n\n\ndef export_combined(\n    graphs: dict[str, Graph],\n    output_folder: str | Path,\n) -> Path:\n    \"\"\"Single combined health.ttl at pod root.\"\"\"\n    out_root = Path(output_folder).resolve()\n    out_root.mkdir(parents=True, exist_ok=True)\n    combined = Graph()\n    for g in graphs.values():\n        for t in g:\n            combined.add(t)\n    path = out_root / \"health\" / \"combined.ttl\"\n    path.parent.mkdir(parents=True, exist_ok=True)\n    combined.serialize(destination=str(path), format=\"turtle\")\n    return path\n\n\ndef graph_to_turtle_string(graph: Graph, max_lines: int = 200) -> str:\n    text = graph.serialize(format=\"turtle\")\n    lines = text.splitlines()\n    if len(lines) > max_lines:\n        lines = lines[:max_lines] + [f\"... ({len(lines) - max_lines} more lines)\"]\n    return \"\\n\".join(lines)\n\n\ndef get_sync_state_path(output_folder: str | Path) -> Path:\n    return Path(output_folder).resolve() / \"sync_state.json\"\n\n\ndef load_sync_state(output_folder: str | Path) -> dict:\n    path = get_sync_state_path(output_folder)\n    if path.exists():\n        try:\n            with open(path, \"r\", encoding=\"utf-8\") as f:\n                return json.load(f)\n        except Exception:\n            return {}\n    return {}\n\n\ndef save_sync_state(output_folder: str | Path, state: dict) -> None:\n    path = get_sync_state_path(output_folder)\n    path.parent.mkdir(parents=True, exist_ok=True)\n    with open(path, \"w\", encoding=\"utf-8\") as f:\n        import json\n        json.dump(state, f, indent=2)\n\n\ndef update_sync_state_for_dtype(output_folder: str | Path, data_type: str, row_count: int) -> None:\n    state = load_sync_state(output_folder)\n    state[data_type] = {\n        \"row_count\": row_count,\n        \"last_sync\": datetime.now().isoformat()\n    }\n    save_sync_state(output_folder, state)\n", "src/loader.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"Parse Samsung Health export folders (CSVs + jsons/).\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport re\nfrom pathlib import Path\nfrom typing import Any\n\nimport pandas as pd\n\nfrom src.utils import data_type_from_filename, resolve_export_root\n\n_SAMSUNG_META_RE = re.compile(r\"^com\\.samsung\\.(?:health|shealth)\\.\")\n\n\ndef _read_csv(path: Path) -> pd.DataFrame:\n    \"\"\"Read Samsung export CSV (skips package metadata row when present).\"\"\"\n    with path.open(encoding=\"utf-8-sig\", errors=\"replace\") as f:\n        first_line = f.readline()\n    if _SAMSUNG_META_RE.match(first_line.strip()):\n        return pd.read_csv(path, skiprows=[0], index_col=False, low_memory=False, on_bad_lines=\"skip\")\n    return pd.read_csv(path, index_col=False, low_memory=False, on_bad_lines=\"skip\")\n\n\ndef _find_json_file(jsons_dir: Path, ref: str) -> Path | None:\n    \"\"\"Resolve JSON under flat or nested jsons/ layout (real exports use subfolders).\"\"\"\n    name = Path(str(ref).strip()).name\n    if not name:\n        return None\n\n    candidates = [\n        jsons_dir / ref,\n        jsons_dir / name,\n    ]\n    for c in candidates:\n        if c.is_file():\n            return c\n\n    if not name.endswith(\".json\"):\n        stem = name\n        for found in jsons_dir.rglob(f\"{stem}*.json\"):\n            return found\n    else:\n        for found in jsons_dir.rglob(name):\n            return found\n    return None\n\n\ndef _load_json_if_exists(jsons_dir: Path, ref: str | float | int | None) -> dict[str, Any] | list[Any] | None:\n    if ref is None or (isinstance(ref, float) and pd.isna(ref)):\n        return None\n    path = _find_json_file(jsons_dir, str(ref))\n    if path is None:\n        return None\n    with path.open(encoding=\"utf-8\", errors=\"replace\") as f:\n        return json.load(f)\n\n\ndef load_export(export_path: str | Path, progress_cb=None) -> dict[str, Any]:\n    \"\"\"\n    Load a Samsung Health export directory.\n\n    ``export_path`` may be the top-level folder (e.g. 20250221_SamsungHealth/)\n    or the inner folder that directly contains CSV + jsons/ files.\n\n    Returns:\n        {\n            \"export_path\": Path,\n            \"export_root_requested\": Path,\n            \"dataframes\": {filename: DataFrame},\n            \"data_types\": {data_type_key: filename},\n            \"jsons_dir\": Path | None,\n            \"json_cache\": {},\n        }\n    \"\"\"\n    requested = Path(export_path).resolve()\n    root = resolve_export_root(requested)\n\n    jsons_dir = root / \"jsons\"\n    has_jsons = jsons_dir.is_dir()\n\n    dataframes: dict[str, pd.DataFrame] = {}\n    data_types: dict[str, str] = {}\n\n    csv_files = sorted(root.glob(\"*.csv\"))\n    total_csvs = len(csv_files)\n\n    for idx, csv_path in enumerate(csv_files):\n        fname = csv_path.name\n        if progress_cb:\n            progress_cb(idx, total_csvs, f\"Loading: {fname}\")\n            \n        df = _read_csv(csv_path)\n        dataframes[fname] = df\n        dtype = data_type_from_filename(fname)\n        data_types[dtype] = fname\n\n    if progress_cb and total_csvs > 0:\n        progress_cb(total_csvs, total_csvs, \"Loading complete.\")\n\n    return {\n        \"export_path\": root,\n        \"export_root_requested\": requested,\n        \"dataframes\": dataframes,\n        \"dataframes_count\": len(dataframes),\n        \"data_types\": data_types,\n        \"jsons_dir\": jsons_dir if has_jsons else None,\n        \"json_cache\": {},\n    }\n\n\ndef enrich_row_with_json(\n    loaded: dict[str, Any],\n    row: dict[str, Any],\n    json_column: str = \"binning_data\",\n) -> dict[str, Any]:\n    \"\"\"Lazily attach JSON payload from jsons/ when row references a file.\"\"\"\n    jsons_dir = loaded.get(\"jsons_dir\")\n    if not jsons_dir:\n        return row\n\n    ref = row.get(json_column) or row.get(\"extra_data\")\n    if ref is None or (isinstance(ref, float) and pd.isna(ref)):\n        return row\n\n    cache: dict[str, Any] = loaded.setdefault(\"json_cache\", {})\n    key = str(ref)\n    if key not in cache:\n        cache[key] = _load_json_if_exists(jsons_dir, ref)\n\n    out = dict(row)\n    out[\"_json_payload\"] = cache[key]\n    return out\n\n\ndef dataframe_with_json(\n    loaded: dict[str, Any],\n    df: pd.DataFrame,\n    json_column: str = \"binning_data\",\n) -> pd.DataFrame:\n    \"\"\"Expand rows that reference jsons/ (binning_data or extra_data).\"\"\"\n    col = json_column\n    if col not in df.columns and \"extra_data\" in df.columns:\n        col = \"extra_data\"\n    if col not in df.columns or not loaded.get(\"jsons_dir\"):\n        return df\n\n    payloads = []\n    for _, row in df.iterrows():\n        enriched = enrich_row_with_json(loaded, row.to_dict(), col)\n        payloads.append(enriched.get(\"_json_payload\"))\n\n    out = df.copy()\n    out[\"_json_payload\"] = payloads\n    return out\n", "src/normalizer.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"Timestamp, unit, and column normalization for Samsung Health exports.\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom datetime import datetime, timedelta, timezone\nfrom typing import Any\n\nimport pandas as pd\n\nfrom src.utils import clean_column_name, data_type_from_filename\n\n_UTC_OFFSET_RE = re.compile(\n    r\"^UTC(?P<sign>[+-])(?P<hours>\\d{2})(?P<minutes>\\d{2})?$\",\n    re.IGNORECASE,\n)\n\n\ndef parse_time_offset_minutes(time_offset: Any) -> int:\n    \"\"\"\n    Parse Samsung time_offset: integer minutes, or strings like UTC+1000 (+10:00).\n    \"\"\"\n    if time_offset is None or (isinstance(time_offset, float) and pd.isna(time_offset)):\n        return 0\n    if isinstance(time_offset, (int, float)):\n        return int(time_offset)\n\n    text = str(time_offset).strip()\n    if not text:\n        return 0\n\n    m = _UTC_OFFSET_RE.match(text)\n    if m:\n        sign = 1 if m.group(\"sign\") == \"+\" else -1\n        hours = int(m.group(\"hours\"))\n        mins = int(m.group(\"minutes\") or 0)\n        return sign * (hours * 60 + mins)\n\n    try:\n        return int(float(text))\n    except (TypeError, ValueError):\n        return 0\n\n\ndef parse_samsung_datetime(value: Any, time_offset: Any = 0) -> datetime | None:\n    \"\"\"\n    Parse Samsung start/end time: Unix ms integer OR 'YYYY-MM-DD HH:MM:SS.sss' string.\n    \"\"\"\n    if value is None or (isinstance(value, float) and pd.isna(value)):\n        return None\n\n    offset_mins = parse_time_offset_minutes(time_offset)\n
