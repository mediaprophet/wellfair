t import PrivacyMode\n\nclass EpistemicStatus(str, Enum):\n    CLINICALLY_VERIFIED = \"clinically-verified\"\n    SELF_REPORTED_UNVERIFIED = \"self-reported-unverified\"\n    SUSPECTED_ONSET = \"suspected-onset\"\n    DISPUTED_MISDIAGNOSIS = \"disputed-misdiagnosis\"\n\nclass PatientProfile(BaseModel):\n    id: str\n    full_name: str\n    date_of_birth: date\n    biological_sex: str = Field(..., description=\"e.g., Male, Female, Intersex\")\n    pronouns: str = Field(..., description=\"e.g., He/Him, She/Her, They/Them, or custom pronouns\")\n    gender_identity: Optional[str] = None\n    ancestry_lineage: str = Field(..., description=\"Genetic ancestral background, e.g., Anglo-Celtic, East Asian, Indigenous Australian\")\n    primary_language: str = Field(..., description=\"e.g., English, Mandarin, Spanish\")\n    medicare_number: Optional[str] = None\n    insurance_provider: Optional[str] = None\n    insurance_policy_number: Optional[str] = None\n    emergency_contact_name: Optional[str] = None\n    emergency_contact_phone: Optional[str] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass DisabilitySupport(BaseModel):\n    id: str\n    support_name: str = Field(..., description=\"e.g., Visual Impairment Braille Aids, Wheelchair Mobility Support\")\n    description: str\n    accessibility_requirements: List[str] = Field(default_factory=list, description=\"e.g., Ramp Access, Screen Reader support\")\n    has_ndis_funding: bool = False\n    registered_provider: Optional[str] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass AllergyConditionNode(BaseModel):\n    id: str\n    name: str = Field(..., description=\"e.g., Penicillin Allergy, Type 1 Diabetes\")\n    category: str = Field(..., description=\"e.g., Food Allergy, Drug Allergy, Chronic Illness, Cardiovascular\")\n    epistemic_status: EpistemicStatus = EpistemicStatus.SELF_REPORTED_UNVERIFIED\n    dispute_rationale: Optional[str] = Field(None, description=\"Explanation if marked as disputed, misdiagnosed, or unconfirmed\")\n    date_onset: Optional[date] = None\n    linked_evidence_uris: List[str] = Field(default_factory=list, description=\"URIs or IDs of reports, tests, or clinical documents supporting/refuting this claim\")\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\n\nclass DwellingType(str, Enum):\n    FIXED_HOUSE = \"fixed-house\"\n    COUCH_SURFING = \"couch-surfing\"\n    ROUGH_SLEEPING = \"rough-sleeping\"\n    MOBILE_HOME_VAN = \"mobile-home-van\"\n    CAMPING_TENT = \"camping-tent\"\n    OTHER = \"other\"\n\n\nclass SleepSecurityLevel(str, Enum):\n    SECURE_CAMPGROUND = \"secure-campground\"\n    PUBLIC_PARKING_MEDIUM_RISK = \"public-parking-medium-risk\"\n    UNPROTECTED_ROUGH_CAMPING_HIGH_RISK = \"unprotected-rough-camping-high-risk\"\n\n\nclass SocialFoundationsRecord(BaseModel):\n    id: str\n    dwelling_type: DwellingType\n    homelessness_or_insecure_sleep: bool = False\n    sleep_insecurity_reason: Optional[str] = Field(None, description=\"e.g. poverty, family separation, travel, etc.\")\n    threat_of_violence: bool = False\n    actual_violence_experienced: bool = False\n    environmental_hazards: List[str] = Field(default_factory=list, description=\"e.g. black mould, dampness, insecure lock, lack of heating/cooling\")\n    is_home_distinct_from_dwelling: bool = False\n    is_trapped_at_location: bool = False\n    trapped_reason: Optional[str] = Field(None, description=\"e.g. financial factors, domestic situations, unable to leave\")\n    deeply_unhappy_or_threatened: bool = False\n    subjective_safety_score: int = Field(..., description=\"Subjective feeling of safety from 1 to 10\")\n    feels_unsafe_due_to_own_behaviors: bool = False\n    own_behaviors_detail: Optional[str] = Field(None, description=\"Explanation if feeling unsafe is related to own health/behaviors/clinical episodes\")\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\n\nclass WalkaboutProfile(BaseModel):\n    id: str\n    shelter_type: str = Field(..., description=\"e.g. Van, Caravan, Tent, Swag, None\")\n    sleep_security_level: SleepSecurityLevel\n    has_water: bool = False\n    has_food_storage: bool = False\n    has_hygiene_facilities: bool = False\n    has_power: bool = False\n    transit_frequency: str = Field(..., description=\"e.g. Daily, Weekly, Nomadic, Seasonal\")\n    transit_details: Optional[str] = None\n    notes: Optional[str] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n", "src/phr_models/proxy_consent.py": "from enum import Enum\nfrom typing import Optional\nfrom pydantic import BaseModel, Field\n\n\nclass PrivacyMode(str, Enum):\n    MODE_A_STRICT = \"V\"  # Very Restricted (Self + Doctor only)\n    MODE_B_PRIVILEGED = \"R\"  # Restricted (Doctor-facing)\n    MODE_C_SHARED = \"N\"  # Normal (Carer/Family shared)\n\n\nclass LegalBasis(str, Enum):\n    EXPLICIT_CONSENT = \"explicit-consent\"\n    GUARDIAN_AUTHORITY = \"guardian-authority\"\n    MHA_NOMINATED = \"mha-nominated\"\n    SAFETY_OVERRIDE = \"safety-override\"\n\n\nclass ProxyRelationship(str, Enum):\n    PARENT = \"PRN\"\n    DEPENDENT = \"DEP\"\n    GUARDIAN = \"GUARD\"\n    PARTNER = \"PART\"\n    CARER = \"CARE\"\n\n\nclass RelatedPerson(BaseModel):\n    \"\"\"FHIR AU Core mapped RelatedPerson for proxy contexts.\"\"\"\n\n    id: str = Field(..., description=\"Unique ID for the proxy/related person\")\n    patient_id: str = Field(..., description=\"The primary subject of the record\")\n    relationship: ProxyRelationship = Field(\n        ..., description=\"SNOMED/HL7 relationship code\"\n    )\n    is_anonymous: bool = Field(\n        False, description=\"True if the proxy must remain de-identified for safety\"\n    )\n    description: Optional[str] = Field(\n        None, description=\"Minimally identifying description of the proxy\"\n    )\n\n\nclass ProxyConsent(BaseModel):\n    \"\"\"FHIR Consent resource mapping bridging the Patient and the Proxy.\"\"\"\n\n    id: str\n    patient_id: str\n    proxy_id: str = Field(\n        ..., description=\"References the RelatedPerson.id acting as the proxy\"\n    )\n    legal_basis: LegalBasis\n    privacy_mode: PrivacyMode = Field(default=PrivacyMode.MODE_A_STRICT)\n    audit_silenced: bool = Field(\n        False,\n        description=\"If True, suppresses standard audit trails for safety-override reasons.\",\n    )\n", "src/phr_models/psychiatric.py": "from __future__ import annotations\n\nfrom datetime import date\nfrom typing import Dict, Optional\n\nfrom pydantic import BaseModel, Field\n\nfrom src.utils import ROOT\n\nclass PsychiatricAssessmentBase(BaseModel):\n    \"\"\"Base model for a psychiatric questionnaire assessment.\n\n    Attributes\n    ----------\n    id: str\n        Unique identifier for the assessment record.\n    name: str\n        Human\u2011readable name of the questionnaire (e.g., \"BDI\u2011II\").\n    date_taken: date\n        Date the assessment was performed.\n    pdf_uri: Optional[str]\n        Absolute file URI where the original PDF is stored.\n    scores: Dict[str, Optional[float]]\n        Mapping of questionnaire item identifiers to numeric scores (or None if not filled).\n    \"\"\"\n\n    id: str = Field(..., description=\"Unique identifier for the assessment\")\n    name: str = Field(..., description=\"Name of the questionnaire\")\n    date_taken: date = Field(default_factory=date.today, description=\"Date of assessment\")\n    pdf_uri: Optional[str] = Field(None, description=\"Path/URI to the stored PDF file\")\n    scores: Dict[str, Optional[float]] = Field(default_factory=dict, description=\"Item scores\")\n\n    class Config:\n        # Allow population by field name for future extensions\n        validate_by_name = True\n\n# Example concrete subclasses \u2013 can be expanded later\nclass BDI2Assessment(PsychiatricAssessmentBase):\n    name: str = \"BDI\u2011II\"\n    # BDI\u2011II has 21 items labelled \"Q1\" \u2026 \"Q21\"\n    scores: Dict[str, Optional[int]] = Field(default_factory=lambda: {f\"Q{i}\": None for i in range(1, 22)})\n\nclass AQ10Assessment(PsychiatricAssessmentBase):\n    name: str = \"AQ\u201110\"\n    scores: Dict[str, Optional[int]] = Field(default_factory=lambda: {f\"Q{i}\": None for i in range(1, 11)})\n", "src/phr_models/psychiatry.py": "from enum import Enum\nfrom typing import Optional\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\nclass ObservationContext(str, Enum):\n    SELF_REPORTED = \"self-reported\"\n    CARER_OBSERVED = \"carer-observed\"\n    CLINICIAN_OBSERVED = \"clinician-observed\"\n\n\nclass DataQualityTag(str, Enum):\n    EXACT = \"exact\"\n    ESTIMATE = \"estimate\"\n\n\nclass PsychiatryObservation(BaseModel):\n    \"\"\"FHIR Observation mapped for trauma-informed psych tracking.\"\"\"\n\n    id: str\n    patient_id: str\n    date_recorded: datetime\n    context: ObservationContext\n    quality_tag: DataQualityTag = Field(default=DataQualityTag.ESTIMATE)\n\n    # Links to ProxyConsent engine\n    recorded_by_proxy_id: Optional[str] = Field(\n        None, description=\"If carer-observed, links to RelatedPerson ID\"\n    )\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_A_STRICT,\n        description=\"Defaults to strict for mental health\",\n    )\n\n    symptom_code: str = Field(\n        ..., description=\"SNOMED CT code for the observed symptom/mood\"\n    )\n    notes: Optional[str] = Field(\n        None, description=\"Free text therapy notes or carer observations\"\n    )\n\n    linked_medication_id: Optional[str] = Field(\n        None, description=\"Link to psychotropic MedicationStatement\"\n    )\n", "src/phr_models/psychology.py": "\"\"\"Psychology domain models \u2013 therapy, formulation, attachment & Sub Rosa.\n\nThis module provides the Pydantic schemas for the Psychology section of\nEpisteme:WellFair, including the sensitive \"Sub Rosa\" confessional recording\nsystem that allows clinically-relevant but socially-invisible data to remain\ncomputationally active within the local vault.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nfrom datetime import datetime, date\nfrom enum import Enum\nfrom typing import Dict, List, Optional\n\nfrom pydantic import BaseModel, Field\n\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\n# ---------------------------------------------------------------------------\n# Enums\n# ---------------------------------------------------------------------------\n\nclass TherapyModality(str, Enum):\n    CBT = \"Cognitive Behavioural Therapy\"\n    DBT = \"Dialectical Behaviour Therapy\"\n    EMDR = \"Eye Movement Desensitisation & Reprocessing\"\n    PSYCHODYNAMIC = \"Psychodynamic Therapy\"\n    SCHEMA = \"Schema Therapy\"\n    ACT = \"Acceptance & Commitment Therapy\"\n    IFS = \"Internal Family Systems\"\n    SOMATIC = \"Somatic Experiencing\"\n    NARRATIVE = \"Narrative Therapy\"\n    GROUP = \"Group Therapy\"\n    OTHER = \"Other / Mixed\"\n\n\nclass AttachmentStyle(str, Enum):\n    SECURE = \"secure\"\n    ANXIOUS_PREOCCUPIED = \"anxious-preoccupied\"\n    DISMISSIVE_AVOIDANT = \"dismissive-avoidant\"\n    FEARFUL_AVOIDANT = \"fearful-avoidant\"\n    DISORGANISED = \"disorganised\"\n\n\nclass SubRosaCategory(str, Enum):\n    \"\"\"Categories for clinically-relevant but socially-sensitive records.\"\"\"\n    SUBSTANCE_USE = \"Substance Use\"\n    SEXUAL_HEALTH = \"Sexual Health & Experiences\"\n    ENVIRONMENTAL_EXPOSURE = \"Environmental Exposure\"\n    DOMESTIC_SITUATION = \"Domestic Situation\"\n    PROFESSIONAL_CONFLICT = \"Professional / NDA Conflict\"\n    LEGAL_ENTANGLEMENT = \"Legal Entanglement\"\n    FINANCIAL_DURESS = \"Financial Duress\"\n    DEVELOPMENTAL_TRAUMA = \"Developmental Trauma\"\n    OTHER = \"Other\"\n\n\n# ---------------------------------------------------------------------------\n# Models\n# ---------------------------------------------------------------------------\n\nclass TherapySessionNote(BaseModel):\n    \"\"\"A single therapy session record.\"\"\"\n    id: str\n    date: datetime = Field(default_factory=datetime.now)\n    modality: TherapyModality = TherapyModality.CBT\n    therapist_agent_id: Optional[str] = Field(\n        None, description=\"DID or Agent Directory ID of the treating psychologist\"\n    )\n    session_summary: str = \"\"\n    homework: Optional[str] = None\n    mood_pre: int = Field(5, ge=0, le=10, description=\"Mood score before session (0-10)\")\n    mood_post: int = Field(5, ge=0, le=10, description=\"Mood score after session (0-10)\")\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\n\nclass PsychologicalFormulation(BaseModel):\n    \"\"\"The '5 Ps' psychological formulation model.\"\"\"\n    id: str\n    date_created: datetime = Field(default_factory=datetime.now)\n    presenting_problems: List[str] = Field(default_factory=list)\n    predisposing_factors: List[str] = Field(default_factory=list)\n    precipitating_factors: List[str] = Field(default_factory=list)\n    perpetuating_factors: List[str] = Field(default_factory=list)\n    protective_factors: List[str] = Field(default_factory=list)\n    formulation_narrative: Optional[str] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\n\nclass AttachmentStyleRecord(BaseModel):\n    \"\"\"Self-assessed or clinician-assessed attachment style.\"\"\"\n    id: str\n    date_assessed: date = Field(default_factory=date.today)\n    style: AttachmentStyle = AttachmentStyle.SECURE\n    confidence: str = \"Medium\"  # Low / Medium / High\n    assessor: str = \"Self\"  # Self, Clinician Name, etc.\n    notes: Optional[str] = None\n\n\nclass SubRosaRecord(BaseModel):\n    \"\"\"A clinically-relevant but socially-invisible sensitive record.\n\n    These records live in the Veiled Graph and are computationally active\n    (can trigger Semantic Tripwires) but are never surfaced to external\n    agents without explicit user consent.\n    \"\"\"\n    id: str\n    timestamp: datetime = Field(default_factory=datetime.now)\n    category: SubRosaCategory\n    narrative: str = Field(\n        ..., description=\"The sensitive fact or observation (encrypted at rest)\"\n    )\n    clinical_relevance: str = Field(\n        \"\", description=\"Why this matters medically \u2013 drug interactions, contraindications, etc.\"\n    )\n    semantic_tags: List[str] = Field(\n        default_factory=list,\n        description=\"SNOMED/ICD codes or free-text tags for conditions this may affect\"\n    )\n    tripwire_rules: List[str] = Field(\n        default_factory=list,\n        description=\"Query patterns that should trigger Semantic Tripwires\"\n    )\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_A_STRICT,\n        description=\"Always Mode A (self + doctor) or Sanctuary-only\"\n    )\n    hypothesis_flag: bool = Field(\n        False, description=\"True if this is a suspicion rather than a confirmed fact\"\n    )\n    provenance_hash: Optional[str] = Field(\n        None, description=\"SHA-256 hash for DLT anchoring\"\n    )\n\n    def compute_provenance_hash(self) -> str:\n        \"\"\"Generate a deterministic SHA-256 hash for immutable provenance.\"\"\"\n        payload = f\"{self.id}|{self.category.value}|{self.narrative}|{self.timestamp.isoformat()}\"\n        h = hashlib.sha256(payload.encode()).hexdigest()\n        self.provenance_hash = h\n        return h\n", "src/phr_models/social_work.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# SPDX-License-Identifier: CC-BY-NC-ND-4.0\n\n\"\"\"\nSocial Work & Assistance \u2014 Pydantic models.\n\nDefines schemas to support individuals requiring social work assistance\n(housing, food, etc.), and government/social security documentation.\n\"\"\"\n\nfrom __future__ import annotations\nfrom enum import Enum\nfrom typing import Optional, List\nfrom datetime import datetime, date\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\nclass AssistanceCategory(str, Enum):\n    HOUSING = \"housing\"\n    FOOD = \"food\"\n    FINANCIAL = \"financial\"\n    HEALTHCARE = \"healthcare\"\n    LEGAL = \"legal\"\n    TRANSPORT = \"transport\"\n    OTHER = \"other\"\n\nclass UrgencyLevel(str, Enum):\n    LOW = \"low\"\n    MODERATE = \"moderate\"\n    HIGH = \"high\"\n    CRITICAL = \"critical\"\n\nclass AssistanceStatus(str, Enum):\n    IDENTIFIED = \"identified\"\n    REFERRAL_SENT = \"referral-sent\"\n    PROGRAM_ACTIVE = \"program-active\"\n    RESOLVED = \"resolved\"\n\nclass AssistanceNeed(BaseModel):\n    id: str\n    category: AssistanceCategory\n    urgency: UrgencyLevel\n    description: str\n    date_logged: datetime\n    status: AssistanceStatus = AssistanceStatus.IDENTIFIED\n    provider_name: Optional[str] = Field(None, description=\"e.g., Salvation Army, Department of Housing\")\n    notes: Optional[str] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass SocialSecurityStatus(str, Enum):\n    APPLIED = \"applied\"\n    APPROVED = \"approved\"\n    SUSPENDED = \"suspended\"\n    REJECTED = \"rejected\"\n    ACTIVE = \"active\"\n\nclass PaymentFrequency(str, Enum):\n    WEEKLY = \"weekly\"\n    FORTNIGHTLY = \"fortnightly\"\n    MONTHLY = \"monthly\"\n    ONE_OFF = \"one-off\"\n\nclass SocialSecurityRecord(BaseModel):\n    id: str\n    agency_name: str = Field(..., description=\"e.g., Centrelink, SSA\")\n    payment_type: str = Field(..., description=\"e.g., JobSeeker, Disability Support Pension\")\n    status: SocialSecurityStatus = SocialSecurityStatus.ACTIVE\n    amount: float\n    frequency: PaymentFrequency\n    start_date: date\n    end_date: Optional[date] = None\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass GovernmentLetter(BaseModel):\n    id: str\n    title: str = Field(..., description=\"e.g., Benefit Review Notice\")\n    sender_agency: str = Field(..., description=\"e.g., Centrelink, Department of Housing\")\n    date_received: date\n    summary: str\n    action_required: Optional[str] = None\n    action_due_date: Optional[date] = None\n    document_uri: Optional[str] = Field(None, description=\"Secure URI to the stored letter PDF\")\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n", "src/phr_models/study.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# SPDX-License-Identifier: CC-BY-NC-ND-4.0\n\n\"\"\"\nStudy & Clinical Research Vault \u2014 Pydantic models.\n\nDefines schemas for structured diagnostic forms, auto-population metadata,\nresearch paper parsing, comorbidity/symptom classification, and cryptographically\nsigned study packages for cooperative care.\n\"\"\"\n\nfrom __future__ import annotations\nfrom enum import Enum\nfrom typing import Optional, List, Dict, Any\nfrom datetime import datetime, date\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\nclass FormQuestion(BaseModel):\n    id: str\n    text: str\n    options: List[str] = Field(default_factory=list, description=\"e.g., ['None of the time', 'A little', 'Some', 'Most', 'All of the time']\")\n    score_weights: List[int] = Field(default_factory=list, description=\"Mapping options to numeric scores, e.g., [1, 2, 3, 4, 5]\")\n\nclass DiagnosticForm(BaseModel):\n    id: str\n    title: str = Field(..., description=\"e.g., Kessler K10 Distress Scale\")\n    questions: List[FormQuestion] = Field(default_factory=list)\n    answers: Dict[str, str] = Field(default_factory=dict, description=\"Question ID to selected option string\")\n    score: int = Field(0, description=\"Total aggregated form score\")\n    autofill_source: Optional[str] = Field(None, description=\"e.g., 'Parsed chat transcript', 'Manual'\")\n    date_filled: datetime\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass ClinicalInsight(BaseModel):\n    category: str = Field(..., description=\"e.g., Comorbidity, Cause, Symptom, Evolution\")\n    title: str\n    description: str\n    confidence_score: float = Field(..., description=\"0.0 to 1.0 extraction confidence\")\n\nclass ResearchPaper(BaseModel):\n    id: str\n    title: str = Field(..., description=\"e.g., Diagnostic Indicators of Chronic Fatigue Syndromes\")\n    authors: str\n    publication_date: date\n    doi: Optional[str] = None\n    extracted_insights: List[ClinicalInsight] = Field(default_factory=list)\n    established_hypotheses: List[str] = Field(default_factory=list, description=\"Hypotheses formulated by the user/system based on this paper\")\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n\nclass SharedStudyPackage(BaseModel):\n    id: str\n    recipient_did: str = Field(..., description=\"DID of recipient, e.g., did:web:laverty.com.au:labs\")\n    shared_form_ids: List[str] = Field(default_factory=list)\n    shared_paper_ids: List[str] = Field(default_factory=list)\n    signature: str = Field(..., description=\"Cryptographic signature of the user validating the package\")\n    date_shared: datetime\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n", "src/phr_models/__init__.py": "\"\"\"PHR Abstract Models mapped to FHIR AU Core.\"\"\"\n\nfrom src.phr_models.cases import CaseFile, CaseTask, CaseCategory, CaseStatus\nfrom src.phr_models.social_work import (\n    AssistanceCategory, UrgencyLevel, AssistanceStatus, AssistanceNeed,\n    SocialSecurityStatus, PaymentFrequency, SocialSecurityRecord, GovernmentLetter\n)\nfrom src.phr_models.profile import (\n    EpistemicStatus, PatientProfile, DisabilitySupport, AllergyConditionNode\n)\nfrom src.phr_models.study import (\n    FormQuestion, DiagnosticForm, ClinicalInsight, ResearchPaper, SharedStudyPackage\n)\n\nfrom src.phr_models.psychiatric import *\nfrom src.phr_models.psychology import (\n    TherapyModality, TherapySessionNote, PsychologicalFormulation,\n    AttachmentStyle, AttachmentStyleRecord, SubRosaCategory, SubRosaRecord\n)\n", "config/dataset_mappings.json": "{\n  \"com.samsung.health.device_profile\": {\n    \"display_name\": \"Device Profile\",\n    \"icon\": \"\ud83d\udcf1\",\n    \"category\": \"System\",\n    \"description\": \"Information about devices synced with Samsung Health (e.g., smartwatches, trackers).\"\n  },\n  \"com.samsung.health.ecg\": {\n    \"display_name\": \"Electrocardiogram (ECG)\",\n    \"icon\": \"\ud83e\ude7a\",\n    \"category\": \"Cardiovascular\",\n    \"description\": \"ECG readings measuring electrical activity of the heart to monitor rhythm.\"\n  },\n  \"com.samsung.health.floors_climbed\": {\n    \"display_name\": \"Floors Climbed\",\n    \"icon\": \"\ud83e\uddd7\",\n    \"category\": \"Activity\",\n    \"description\": \"Daily count of stairs or elevation climbed (in floors).\"\n  },\n  \"com.samsung.health.food_info\": {\n    \"display_name\": \"Food Database Info\",\n    \"icon\": \"\ud83c\udf4f\",\n    \"category\": \"Nutrition\",\n    \"description\": \"Reference lookup data for foods, calorie content, and macro breakdown.\"\n  },\n  \"com.samsung.health.food_intake\": {\n    \"display_name\": \"Food Intake\",\n    \"icon\": \"\ud83c\udf7d\ufe0f\",\n    \"category\": \"Nutrition\",\n    \"description\": \"Logged meals, ingredients, nutritional values, and time consumed.\"\n  },\n  \"com.samsung.health.height\": {\n    \"display_name\": \"Height Logs\",\n    \"icon\": \"\ud83d\udccf\",\n    \"category\": \"Body / Profile\",\n    \"description\": \"Historical logs of physical height measurements.\"\n  },\n  \"com.samsung.health.nutrition\": {\n    \"display_name\": \"Daily Nutrition Summaries\",\n    \"icon\": \"\ud83e\udd57\",\n    \"category\": \"Nutrition\",\n    \"description\": \"Daily summary of total consumed fats, protein, carbs, and micronutrients.\"\n  },\n  \"com.samsung.health.sleep_stage\": {\n    \"display_name\": \"Sleep Stage Details\",\n    \"icon\": \"\ud83d\ud
