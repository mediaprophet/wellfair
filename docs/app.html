tz = timezone(timedelta(minutes=offset_mins)) if offset_mins else timezone.utc\n\n    # Unix epoch milliseconds\n    try:\n        ms_int = int(float(value))\n        if ms_int > 1_000_000_000_000:\n            utc_dt = datetime.fromtimestamp(ms_int / 1000.0, tz=timezone.utc)\n            if offset_mins:\n                local = utc_dt.astimezone(tz)\n                return local\n            return utc_dt\n        if ms_int > 1_000_000_000:\n            return datetime.fromtimestamp(ms_int, tz=tz)\n    except (TypeError, ValueError):\n        pass\n\n    try:\n        dt = pd.to_datetime(value, utc=False)\n        if pd.isna(dt):\n            return None\n        py = dt.to_pydatetime()\n        if py.tzinfo is None:\n            return py.replace(tzinfo=tz)\n        return py\n    except (TypeError, ValueError):\n        return None\n\n\ndef ms_to_aware_datetime(\n    ms: Any,\n    time_offset: Any = 0,\n) -> datetime | None:\n    \"\"\"Convert Samsung time + offset to timezone-aware datetime.\"\"\"\n    return parse_samsung_datetime(ms, time_offset)\n\n\ndef ms_to_iso_with_offset(row: dict[str, Any], col: str = \"start_time\") -> str | None:\n    \"\"\"ISO 8601 string from row start_time + time_offset.\"\"\"\n    dt = parse_samsung_datetime(\n        row.get(col) or row.get(f\"com.samsung.health.{col}\"),\n        row.get(\"time_offset\"),\n    )\n    return dt.isoformat() if dt else None\n\n\ndef minutes_to_iso_duration(minutes: Any) -> str | None:\n    if minutes is None or (isinstance(minutes, float) and pd.isna(minutes)):\n        return None\n    try:\n        m = int(float(minutes))\n    except (TypeError, ValueError):\n        return None\n    if m <= 0:\n        return None\n    return f\"PT{m}M\"\n\n\ndef normalize_dataframe(df: pd.DataFrame, data_type: str | None = None) -> pd.DataFrame:\n    \"\"\"Clean column names and add derived datetime columns.\"\"\"\n    out = df.copy()\n    out.columns = [clean_column_name(c) for c in out.columns]\n\n    if \"start_time\" in out.columns:\n        offsets = out[\"time_offset\"] if \"time_offset\" in out.columns else 0\n        out[\"start_datetime\"] = [\n            parse_samsung_datetime(st, off)\n            for st, off in zip(out[\"start_time\"], offsets)\n        ]\n\n    if \"end_time\" in out.columns:\n        offsets = out[\"time_offset\"] if \"time_offset\" in out.columns else 0\n        out[\"end_datetime\"] = [\n            parse_samsung_datetime(et, off)\n            for et, off in zip(out[\"end_time\"], offsets)\n        ]\n\n    if data_type:\n        out.attrs[\"data_type\"] = data_type\n    return out\n\n\ndef normalize_export(loaded: dict[str, Any], progress_cb=None) -> dict[str, Any]:\n    \"\"\"Normalize all DataFrames in a load_export() result.\"\"\"\n    frames: dict[str, pd.DataFrame] = {}\n    total = len(loaded.get(\"dataframes\", {}))\n    \n    for idx, (key, df) in enumerate(loaded.get(\"dataframes\", {}).items()):\n        if progress_cb:\n            progress_cb(idx, total, f\"Normalizing: {key}\")\n            \n        dtype = data_type_from_filename(key) if key.endswith(\".csv\") else key\n        if not key.endswith(\".csv\"):\n            dtype = key\n        frames[key] = normalize_dataframe(df, dtype)\n        \n    if progress_cb and total > 0:\n        progress_cb(total, total, \"Normalization complete.\")\n\n    return {\n        **loaded,\n        \"dataframes\": frames,\n    }\n", "src/rdf_transformer.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"Template-driven RDF: schema.org + QUDT + PROV-O + optional SNOMED/LOINC/FHIR.\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nfrom dataclasses import dataclass\nfrom datetime import datetime, timezone\nfrom pathlib import Path\nfrom typing import Any\n\nimport pandas as pd\nimport yaml\nfrom rdflib import Graph, Literal, Namespace, URIRef\nfrom rdflib.namespace import RDF, XSD\n\nfrom src.normalizer import minutes_to_iso_duration, ms_to_aware_datetime\nfrom src.utils import clean_column_name, data_type_from_filename, safe_str\n\nCLINICAL_PREFIXES = frozenset({\"snomed\", \"loinc\", \"fhir\"})\n\n\n@dataclass\nclass TransformOptions:\n    \"\"\"Runtime options for RDF generation.\"\"\"\n\n    clinical_mode: bool = True\n    include_provenance: bool = True\n    export_label: str = \"Samsung Health CSV export\"\n\n\nclass OntologyTemplate:\n    \"\"\"Load and expose ontology_template.yaml.\"\"\"\n\n    def __init__(self, template_path: str | Path):\n        self.path = Path(template_path)\n        self.reload()\n\n    def reload(self) -> None:\n        with self.path.open(encoding=\"utf-8\") as f:\n            self.raw = yaml.safe_load(f) or {}\n        self.namespaces: dict[str, str] = self.raw.get(\"namespaces\", {})\n        self.mappings: dict[str, Any] = self.raw.get(\"mappings\", {})\n        self.default_subject = self.raw.get(\n            \"default_subject_template\", \"urn:health:{data_type}:{uuid}\"\n        )\n        self.provenance_cfg: dict[str, Any] = self.raw.get(\"provenance\", {})\n        self.unit_aliases: dict[str, str] = self.raw.get(\"unit_aliases\", {})\n        self.ontology_modes: dict[str, Any] = self.raw.get(\"ontology_modes\", {})\n        self.mapping_aliases: dict[str, str] = self.raw.get(\"mapping_aliases\", {})\n\n    def resolve_mapping(self, data_type: str) -> tuple[str, dict[str, Any] | None]:\n        \"\"\"Return canonical data type key and mapping (via aliases).\"\"\"\n        if data_type in self.mappings:\n            return data_type, self.mappings[data_type]\n        canonical = self.mapping_aliases.get(data_type)\n        if canonical and canonical in self.mappings:\n            return canonical, self.mappings[canonical]\n        return data_type, None\n\n    def bind_namespaces(self, graph: Graph) -> None:\n        for prefix, uri in self.namespaces.items():\n            graph.bind(prefix, Namespace(uri), override=True)\n\n    def clinical_references_enabled(self, options: TransformOptions) -> bool:\n        if options.clinical_mode:\n            return True\n        mode = self.ontology_modes.get(\"clinical\", {})\n        return bool(mode.get(\"include_clinical_references\", False))\n\n\ndef _expand_subject(template: str, row: dict[str, Any], data_type: str) -> str:\n    uuid = (\n        safe_str(row.get(\"uuid\"))\n        or safe_str(row.get(\"datauuid\"))\n        or safe_str(row.get(\"custom\"))\n        or \"unknown\"\n    )\n    return template.format(\n        data_type=data_type.split(\".\")[-1] if \".\" in data_type else data_type,\n        uuid=uuid,\n    )\n\n\ndef resolve_uri(term: str, ns_map: dict[str, Namespace]) -> URIRef:\n    \"\"\"\n    Resolve prefixed CURIE (schema:Person), bare local with health default,\n    or full http(s) URI.\n    \"\"\"\n    term = str(term).strip()\n    if term.startswith((\"http://\", \"https://\", \"urn:\")):\n        return URIRef(term)\n    if \":\" not in term:\n        if \"health\" in ns_map:\n            return URIRef(str(ns_map[\"health\"]) + term)\n        raise ValueError(f\"Cannot resolve bare term: {term}\")\n    prefix, local = term.split(\":\", 1)\n    if prefix not in ns_map:\n        raise KeyError(f\"Unknown namespace prefix: {prefix}\")\n    base = str(ns_map[prefix])\n    if base.endswith(\"#\") or base.endswith(\"/\"):\n        return URIRef(base + local)\n    return URIRef(f\"{base}{local}\")\n\n\ndef resolve_unit_uri(\n    unit: str,\n    ns_map: dict[str, Namespace],\n    unit_aliases: dict[str, str],\n) -> URIRef | None:\n    \"\"\"Map qudt-unit:Kilogram, qudt:KGM, or KGM alias to QUDT vocab unit URI.\"\"\"\n    if not unit:\n        return None\n    unit = str(unit).strip()\n\n    if unit.startswith((\"http://\", \"https://\")):\n        return URIRef(unit)\n\n    if \":\" in unit:\n        prefix, local = unit.split(\":\", 1)\n        if prefix in (\"qudt-unit\", \"qudt\"):\n            vocab = ns_map.get(\"qudt-unit\") or ns_map.get(\"qudt\")\n            if vocab:\n                return URIRef(str(vocab) + local)\n        return resolve_uri(unit, ns_map)\n\n    local = unit_aliases.get(unit.upper(), unit)\n    vocab = ns_map.get(\"qudt-unit\")\n    if vocab:\n        return URIRef(str(vocab) + local)\n    return None\n\n\ndef _apply_transform(\n    transform: str | None,\n    value: Any,\n    row: dict[str, Any],\n    prop_cfg: dict[str, Any],\n) -> Any:\n    if value is None or (isinstance(value, float) and pd.isna(value)):\n        return None\n    if not transform:\n        return value\n\n    if transform == \"unix_ms_to_iso_with_offset\":\n        col = prop_cfg.get(\"source_column\")\n        ms = row.get(col) if col else value\n        dt = ms_to_aware_datetime(ms, row.get(\"time_offset\"))\n        return dt.isoformat() if dt else None\n\n    if transform == \"minutes_to_iso_duration\":\n        return minutes_to_iso_duration(value)\n\n    return value\n\n\ndef _literal_for_value(value: Any, prop_cfg: dict[str, Any]) -> Literal | None:\n    if value is None:\n        return None\n    if isinstance(value, datetime):\n        return Literal(value.isoformat(), datatype=XSD.dateTime)\n    if isinstance(value, bool):\n        return Literal(value, datatype=XSD.boolean)\n    if isinstance(value, int):\n        return Literal(value, datatype=XSD.integer)\n    if isinstance(value, float):\n        return Literal(value, datatype=XSD.decimal)\n    return Literal(str(value))\n\n\ndef _add_clinical_reference(\n    g: Graph,\n    subj: URIRef,\n    prop_cfg: dict[str, Any],\n    ns_map: dict[str, Namespace],\n) -> None:\n    \"\"\"Emit health:semanticReference links to FHIR / SNOMED / LOINC URIs.\"\"\"\n    ref_pred = URIRef(str(ns_map[\"health\"]) + \"semanticReference\")\n    for key in (\"fhir_reference\", \"snomed_reference\", \"loinc_reference\"):\n        ref = prop_cfg.get(key)\n        if not ref:\n            continue\n        try:\n            target = resolve_uri(str(ref), ns_map)\n        except (KeyError, ValueError):\n            continue\n        g.add((subj, ref_pred, target))\n        g.add((target, RDF.type, URIRef(str(ns_map[\"health\"]) + \"InteroperabilityLink\")))\n\n\ndef _add_provenance(\n    g: Graph,\n    subj: URIRef,\n    template: OntologyTemplate,\n    options: TransformOptions,\n    ns_map: dict[str, Namespace],\n) -> None:\n    if not options.include_provenance:\n        return\n    prov = template.provenance_cfg\n    if not prov:\n        return\n\n    derived = prov.get(\"was_derived_from\", \"urn:health:source:samsung-health-export\")\n    g.add((subj, URIRef(str(ns_map[\"prov\"]) + \"wasDerivedFrom\"), URIRef(derived)))\n    g.add(\n        (\n            subj,\n            URIRef(str(ns_map[\"prov\"]) + \"wasGeneratedBy\"),\n            URIRef(f\"urn:health:agent:{prov.get('generator', 'wellfair')}\"),\n        ),\n    )\n    label = prov.get(\"source_label\") or options.export_label\n    g.add((subj, URIRef(str(ns_map[\"schema\"]) + \"description\"), Literal(label)))\n\n\ndef _add_type_level_clinical(\n    g: Graph,\n    subj: URIRef,\n    mapping: dict[str, Any],\n    ns_map: dict[str, Namespace],\n) -> None:\n    concept = mapping.get(\"snomed_concept\")\n    if concept:\n        try:\n            concept_uri = resolve_uri(str(concept), ns_map)\n            g.add((subj, URIRef(str(ns_map[\"health\"]) + \"snomedConcept\"), concept_uri))\n        except (KeyError, ValueError):\n            pass\n    loinc = mapping.get(\"loinc_concept\")\n    if loinc:\n        try:\n            loinc_uri = resolve_uri(str(loinc), ns_map)\n            g.add((subj, URIRef(str(ns_map[\"health\"]) + \"loincConcept\"), loinc_uri))\n        except (KeyError, ValueError):\n            pass\n\n\ndef _add_qudt_value_bundle(\n    g: Graph,\n    subj: URIRef,\n    pred: URIRef,\n    lit: Literal,\n    unit_uri: URIRef | None,\n    ns_map: dict[str, Namespace],\n) -> None:\n    \"\"\"Attach value literal and QUDT unit on subject (schema.org + QUDT pattern).\"\"\"\n    g.add((subj, pred, lit))\n    if unit_uri is None:\n        return\n    qudt_unit_pred = URIRef(str(ns_map.get(\"qudt\", Namespace(\"http://qudt.org/schema/qudt/\"))) + \"unit\")\n    g.add((subj, qudt_unit_pred, unit_uri))\n    if \"schema\" in ns_map:\n        g.add((subj, URIRef(str(ns_map[\"schema\"]) + \"unitCode\"), Literal(str(unit_uri).split(\"/\")[-1])))\n\n\ndef rows_from_dataframe(df: pd.DataFrame) -> list[dict[str, Any]]:\n    rows = []\n    for _, series in df.iterrows():\n        row = {clean_column_name(k): v for k, v in series.items()}\n        rows.append(row)\n    return rows\n\n\ndef graph_for_data_type(\n    template: OntologyTemplate,\n    data_type: str,\n    df: pd.DataFrame,\n    options: TransformOptions | None = None,\n) -> Graph:\n    \"\"\"Build RDF graph for one data type using template mapping.\"\"\"\n    options = options or TransformOptions()\n    _canonical, mapping = template.resolve_mapping(data_type)\n    if not mapping:\n        return Graph()\n\n    g = Graph()\n    template.bind_namespaces(g)\n    ns_map = {p: Namespace(u) for p, u in template.namespaces.items()}\n    clinical = template.clinical_references_enabled(options)\n\n    rdf_type = mapping.get(\"rdf_type\", \"schema:Thing\")\n    type_uri = resolve_uri(str(rdf_type), ns_map)\n    also_type = mapping.get(\"schema_also_type\")\n    subject_tpl = mapping.get(\"subject\") or template.default_subject\n    props: dict[str, Any] = mapping.get(\"properties\", {})\n\n    for row in rows_from_dataframe(df):\n        subj_str = _expand_subject(subject_tpl, row, data_type)\n        subj = URIRef(subj_str)\n        g.add((subj, RDF.type, type_uri))\n        if also_type:\n            g.add((subj, RDF.type, resolve_uri(str(also_type), ns_map)))\n\n        label = mapping.get(\"label\")\n        if label:\n            g.add((subj, URIRef(str(ns_map[\"schema\"]) + \"name\"), Literal(label)))\n\n        if clinical:\n            _add_type_level_clinical(g, subj, mapping, ns_map)\n\n        _add_provenance(g, subj, template, options, ns_map)\n\n        for col_key, prop_cfg in props.items():\n            if isinstance(prop_cfg, str):\n                prop_cfg = {\"predicate\": prop_cfg}\n            pred_s = prop_cfg.get(\"predicate\")\n            if not pred_s:\n                continue\n\n            col = clean_column_name(col_key)\n            raw = row.get(col)\n            if raw is None or (isinstance(raw, float) and pd.isna(raw)):\n                continue\n\n            transform = prop_cfg.get(\"transform\")\n            value = _apply_transform(\n                transform, raw, row, {**prop_cfg, \"source_column\": col}\n            )\n            if value is None:\n                continue\n\n            lit = _literal_for_value(value, prop_cfg)\n            if lit is None:\n                continue\n\n            pred = resolve_uri(str(pred_s), ns_map)\n            unit_uri = resolve_unit_uri(\n                prop_cfg.get(\"unit\", \"\"),\n                ns_map,\n                template.unit_aliases,\n            )\n            _add_qudt_value_bundle(g, subj, pred, lit, unit_uri, ns_map)\n\n            if clinical:\n                _add_clinical_reference(g, subj, prop_cfg, ns_map)\n\n    return g\n\n\ndef transform_export(\n    normalized: dict[str, Any],\n    template_path: str | Path,\n    progress: bool = False,\n    options: TransformOptions | None = None,\n) -> dict[str, Graph]:\n    \"\"\"Transform all normalized dataframes into per-data-type graphs.\"\"\"\n    template = OntologyTemplate(template_path)\n    options = options or TransformOptions()\n    graphs: dict[str, Graph] = {}\n\n    items = list(normalized.get(\"dataframes\", {}).items())\n    iterator = items\n    if progress:\n        from tqdm import tqdm\n\n        iterator = tqdm(items, desc=\"RDF transform\")\n\n    for filename, df in iterator:\n        data_type = data_type_from_filename(filename)\n        g = graph_for_data_type(template, data_type, df, options)\n        if len(g):\n            graphs[data_type] = g\n\n    return graphs\n\n\ndef merge_graphs(graphs: dict[str, Graph]) -> Graph:\n    merged = Graph()\n    for g in graphs.values():\n        for t in g:\n            merged.add(t)\n    return merged\n\n\ndef graph_to_jsonld(graph: Graph, indent: int = 2) -> str:\n    \"\"\"Serialize graph to JSON-LD string.\"\"\"\n    try:\n        data = json.loads(graph.serialize(format=\"json-ld\"))\n        return json.dumps(data, indent=indent, default=str)\n    except Exception:\n        return json.dumps({\"@context\": {}, \"@graph\": []}, indent=indent)\n\n\ndef count_clinical_triples(graph: Graph) -> dict[str, int]:\n    \"\"\"Count triples touching SNOMED / LOINC / FHIR / QUDT namespaces.\"\"\"\n    counts = {\"snomed\": 0, \"loinc\": 0, \"fhir\": 0, \"qudt\": 0, \"health_ref\": 0}\n    markers = {\n        \"snomed\": \"snomed.info\",\n        \"loinc\": \"loinc.org\",\n        \"fhir\": \"hl7.org/fhir\",\n        \"qudt\": \"qudt.org\",\n    }\n    health_sem = \"semanticReference\"\n    for s, p, o in graph:\n        for key, fragment in markers.items():\n            if fragment in str(s) or fragment in str(o) or fragment in str(p):\n                counts[key] += 1\n        if health_sem in str(p):\n            counts[\"health_ref\"] += 1\n    return counts\n\n\ndef load_template(template_path: str | Path) -> OntologyTemplate:\n    return OntologyTemplate(template_path)\n", "src/sleep_analytics.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\r\n# https://www.linkedin.com/in/ubiquitous/\r\n#\r\n# SPDX-License-Identifier: GPL-3.0-or-later\r\n\r\n\"\"\"\r\nAdvanced sleep analytics and metrics calculation.\r\nProvides sleep quality scoring, trend analysis, and personalized insights.\r\n\"\"\"\r\n\r\nfrom __future__ import annotations\r\n\r\nfrom datetime import datetime, timedelta\r\nfrom typing import Optional\r\nimport numpy as np\r\nimport pandas as pd\r\n\r\n\r\nclass SleepMetrics:\r\n    \"\"\"Calculate comprehensive sleep metrics and quality scores.\"\"\"\r\n    \r\n    OPTIMAL_SLEEP_DURATION = 420  # 7 hours in minutes\r\n    MIN_SLEEP_DURATION = 300  # 5 hours\r\n    MAX_SLEEP_DURATION = 600  # 10 hours\r\n    TARGET_EFFICIENCY = 85  # %\r\n    \r\n    @staticmethod\r\n    def calculate_sleep_score(\r\n        duration_mins: float,\r\n        efficiency: float,\r\n        consistency_score: float = 50.0\r\n    ) -> float:\r\n        \"\"\"\r\n        Calculate overall sleep score (0-100).\r\n        \r\n        Weighted components:\r\n        - Duration quality (40%): how close to optimal 7h\r\n        - Efficiency (35%): percentage of time asleep vs in bed\r\n        - Consistency (25%): regularity of sleep schedule\r\n        \"\"\"\r\n        # Duration score: peak at 7h, decay outside range\r\n        if duration_mins >= SleepMetrics.OPTIMAL_SLEEP_DURATION - 30 and duration_mins <= SleepMetrics.OPTIMAL_SLEEP_DURATION + 30:\r\n            duration_score = 100\r\n        else:\r\n            # Calculate distance from optimal\r\n            distance = abs(duration_mins - SleepMetrics.OPTIMAL_SLEEP_DURATION)\r\n            duration_score = max(0, 100 - (distance / 5))  # -2 points per 10min deviation\r\n        \r\n        # Efficiency score: target 85%+\r\n        efficiency_score = min(100, efficiency * (100 / SleepMetrics.TARGET_EFFICIENCY))\r\n        \r\n        # Consistency score (passed in)\r\n        consistency_component = consistency_score\r\n        \r\n        # Weighted average\r\n        sleep_score = (\r\n            duration_score * 0.40 +\r\n            efficiency_score * 0.35 +\r\n            consistency_component * 0.25\r\n        )\r\n        \r\n        return max(0, min(100, sleep_score))\r\n    \r\n    @staticmethod\r\n    def calculate_consistency_score(df: pd.DataFrame, time_col: str = \"start_datetime\") -> float:\r\n        \"\"\"\r\n        Calculate sleep consistency score (0-100).\r\n        \r\n        Based on:\r\n        - Standard deviation of sleep times\r\n        - Regularity of sleep/wake times across week\r\n        \"\"\"\r\n        if df.empty or time_col not in df.columns:\r\n            return 50.0\r\n        \r\n        df = df.copy()\r\n        if not pd.api.types.is_datetime64_any_dtype(df[time_col]):\r\n            df[time_col] = pd.to_datetime(df[time_col], errors=\"coerce\")\r\n        \r\n        df = df.dropna(subset=[time_col])\r\n        if len(df) < 3:\r\n            return 50.0\r\n        \r\n        # Extract hour of sleep\r\n        sleep_hours = df[time_col].dt.hour + df[time_col].dt.minute / 60\r\n        hour_std = sleep_hours.std()\r\n        \r\n        # Score: lower std = higher consistency\r\n        # Maximum std ~3 hours = 0 points, 0 std = 100 points\r\n        consistency = max(0, 100 - (hour_std / 3 * 100))\r\n        return float(consistency)\r\n    \r\n    @staticmethod\r\n    def calculate_sleep_debt(df: pd.DataFrame, sleep_duration_col: str = \"sleep_duration\") -> dict:\r\n        \"\"\"\r\n        Calculate accumulated sleep debt over recent period.\r\n        \r\n        Sleep debt = (optimal_duration - actual_duration) per night\r\n        \"\"\"\r\n        if df.empty or sleep_duration_col not in df.columns:\r\n            return {\"debt_minutes\": 0, \"deficit_nights\": 0, \"avg_deficit\": 0}\r\n        \r\n        df = df.copy()\r\n        durations = df[sleep_duration_col].dropna()\r\n        \r\n        if durations.empty:\r\n            return {\"debt_minutes\": 0, \"deficit_nights\": 0, \"avg_deficit\": 0}\r\n        \r\n        # Calculate debt\r\n        deficits = [\r\n            max(0, SleepMetrics.OPTIMAL_SLEEP_DURATION - d)\r\n            for d in durations\r\n        ]\r\n        \r\n        return {\r\n            \"debt_minutes\": int(sum(deficits)),\r\n            \"deficit_nights\": sum(1 for d in deficits if d > 0),\r\n            \"avg_deficit\": float(np.mean(deficits)) if deficits else 0\r\n        }\r\n    \r\n    @staticmethod\r\n    def classify_sleep_quality(sleep_score: float) -> tuple[str, str]:\r\n        \"\"\"Classify sleep quality and provide summary.\"\"\"\r\n        if sleep_score >= 85:\r\n            return \"Excellent\", \"Your sleep quality is optimal. Maintain current habits.\"\r\n        elif sleep_score >= 75:\r\n            return \"Good\", \"Sleep quality is good with room for minor improvements.\"\r\n        elif sleep_score >= 65:\r\n            return \"Fair\", \"Consider addressing sleep consistency or duration.\"\r\n        elif sleep_score >= 50:\r\n            return \"Poor\", \"Sleep quality needs attention. See recommendations below.\"\r\n        else:\r\n            return \"Very Poor\", \"Significant sleep issues detected. Consult a healthcare provider.\"\r\n\r\n\r\nclass SleepTrendAnalysis:\r\n    \"\"\"Analyze sleep trends and patterns.\"\"\"\r\n    \r\n    @staticmethod\r\n    def detect_trend(df: pd.DataFrame, metric_col: str, time_col: str = \"start_datetime\") -> dict:\r\n        \"\"\"\r\n        Detect trend in sleep metric (improving/declining/stable).\r\n        \r\n        Uses simple linear regression on recent 7-14 days.\r\n        \"\"\"\r\n        if df.empty or metric_col not in df.columns or time_col not in df.columns:\r\n            return {\"trend\": \"insufficient_data\", \"slope\": 0, \"direction\": \"N/A\"}\r\n        \r\n        df = df.copy()\r\n        if not pd.api.types.is_datetime64_any_dtype(df[time_col]):\r\n            df[time_col] = pd.to_datetime(df[time_col], errors=\"coerce\")\r\n        \r\n        df = df.dropna(subset=[time_col, metric_col]).sort_values(time_col).tail(14)\r\n        \r\n        if len(df) < 3:\r\n            return {\"trend\": \"insufficient_data\", \"slope\": 0, \"direction\": \"N/A\"}\r\n        \r\n        # Simple linear regression\r\n        x = np.arange(len(df))\r\n        y = df[metric_col].values\r\n        \r\n        slope, intercept = np.polyfit(x, y, 1)\r\n        \r\n        # Classify trend\r\n        if abs(slope) < 0.5:\r\n            trend = \"stable\"\r\n            direction = \"\u2192\"\r\n        elif slope > 0:\r\n            trend = \"improving\"\r\n            direction = \"\u2191\"\r\n        else:\r\n            trend = \"declining\"\r\n            direction = \"\u2193\"\r\n        \r\n        return {\r\n            \"trend\": trend,\r\n            \"slope\": float(slope),\r\n            \"direction\": direction,\r\n            \"change_per_day\": float(slope)\r\n        }\r\n    \r\n    @staticmethod\r\n    def weekly_comparison(df: pd.DataFrame, metric_col: str, time_col: str = \"start_datetime\") -> dict:\r\n        \"\"\"\r\n        Compare current week vs previous week metrics.\r\n        \"\"\"\r\n        if df.empty or metric_col not in df.columns or time_col not in df.columns:\r\n            return {}\r\n        \r\n        df = df.copy()\r\n        if not pd.api.types.is_datetime64_any_dtype(df[time_col]):\r\n            df[time_col] = pd.to_datetime(df[time_col], errors=\"coerce\")\r\n        \r\n        df = df.dropna(subset=[time_col, metric_col]).sort_values(time_col)\r\n        \r\n        if df.empty:\r\n            return {}\r\n        \r\n        today = df[time_col].max().date()\r\n        week_ago = today - timedelta(days=7)\r\n        two_weeks_ago = today - timedelta(days=14)\r\n        \r\n        # Current week\r\n        current_week = df[(df[time_col].dt.date >= week_ago) & (df[time_col].dt.date < today)]\r\n        current_avg = current_week[metric_col].mean() if not current_week.empty else None\r\n        \r\n        # Previous week\r\n        previous_week = df[(df[time_col].dt.date >= two_weeks_ago) & (df[time_col].dt.date < week_ago)]\r\n        previous_avg = previous_week[metric_col].mean() if not previous_week.empty else None\r\n        \r\n        if current_avg is None or previous_avg is None:\r\n            return {\"current\": current_avg, \"previous\": previous_avg, \"change\": None}\r\n        \r\n        change = current_avg - previous_avg\r\n        pct_change = (change / previous_avg * 100) if previous_avg != 0 else 0\r\n        \r\n        return {\r\n            \"current\": float(current_avg),\r\n            \"previous\": float(previous_avg),\r\n            \"change\": float(change),\r\n            \"pct_change\": float(pct_change),\r\n            \"improvement\": change > 0\r\n        }\r\n\r\n\r\nclass SleepInsights:\r\n    \"\"\"Generate actionable sleep insights and recommendations.\"\"\"\r\n    \r\n    @staticmethod\r\n    def generate_insights(\r\n        sleep_df: pd.DataFrame,\r\n        sleep_stage_df: Optional[pd.DataFrame] = None\r\n    ) -> list[dict]:\r\n        \"\"\"Generate personalized insights from sleep data.\"\"\"\r\n        insights = []\r\n        \r\n        if sleep_df.empty:\r\n            return [{\"icon\": \"\u26a0\ufe0f\", \"title\": \"No Data\", \"message\": \"Insufficient sleep data to generate insights.\"}]\r\n        \r\n        # Insight 1: Duration consistency\r\n        if \"sleep_duration\" in sleep_df.columns:\r\n            durations = sleep_df[\"sleep_duration\"].dropna()\r\n            if len(durations) >= 3:\r\n                duration_std = durations.std()\r\n                avg_duration = durations.mean()\r\n                \r\n                if duration_std > 90:  # >1.5 hours std dev\r\n                    insights.append({\r\n                        \"icon\": \"\ud83d\udcca\",\r\n                        \"title\": \"Inconsistent Sleep Duration\",\r\n                        \"message\": f\"Your sleep duration varies by ~{int(duration_std)} minutes. Try maintaining a consistent schedule.\",\r\n                        \"severity\": \"warning\"\r\n                    })\r\n                elif avg_duration < 360:  # <6 hours\r\n                    insights.append({\r\n                        \"icon\": \"\ud83d\ude34\",\r\n                        \"title\": \"Sleep Duration Below Optimal\",\r\n                        \"message\": f\"Average {int(avg_duration/60)}h {int(avg_duration%60)}m. Aim for 7 hours for optimal health.\",\r\n                        \"severity\": \"warning\"\r\n                    })\r\n                else:\r\n                    insights.append({\r\n                        \"icon\": \"\u2705\",\r\n                        \"title\": \"Good Sleep Duration\",\r\n                        \"message\": f\"Averaging {int(avg_duration/60)}h {int(avg_duration%60)}m\u2014excellent sleep amount.\",\r\n                        \"severity\": \"success\"\r\n                    })\r\n        \r\n        # Insight 2: Efficiency\r\n        if \"efficiency\" in sleep_df.columns:\r\n            efficiency = sleep_df[\"efficiency\"].dropna()\r\n            if not efficiency.empty:\r\n                avg_eff = efficiency.mean()\r\n                if avg_eff < 80:\r\n                    insights.append({\r\n                        \"icon\": \"\ud83c\udf19\",\r\n                        \"title\": \"Low Sleep Efficiency\",\r\n                        \"message\": f\"Sleep efficiency {int(avg_eff)}% suggests nighttime awakenings. Consider sleep environment improvements.\",\r\n                        \"severity\": \"warning\"\r\n                    })\r\n        \r\n        # Insight 3: Sleep stages (if available)\r\n        if sleep_stage_df is not None and not sleep_stage_df.empty and \"stage\" in sleep_stage_df.columns:\r\n            stages = sleep_stage_df[\"stage\"].value_counts()\r\n            if 40004 in stages and 40003 not in stages:  # REM but no deep sleep\r\n                insights.append({\r\n                    \"icon\": \"\ud83e\udde0\",\r\n                    \"title\": \"Limited Deep Sleep\",\r\n                    \"message\": \"Your sleep may lack sufficient deep sleep. Deep sleep is crucial for physical recovery.\",\r\n                    \"severity\": \"warning\"\r\n                })\r\n        \r\n        return insights if insights else [\r\n            {\r\n                \"icon\": \"\u2b50\",\r\n                \"title\": \"Sleep Quality Excellent\",\r\n                \"message\": \"Your sleep patterns look great! Keep up the good habits.\",\r\n                \"severity\": \"success\"\r\n            }\r\n        ]\r\n    \r\n    @staticmethod\r\n    def get_recommendations(sleep_score: float, sleep_df: pd.DataFrame) -> list[str]:\r\n        \"\"\"Get personalized sleep recommendations.\"\"\"\r\n        recommendations = []\r\n        \r\n        if sleep_score < 60:\r\n            recommendations.extend([\r\n                \"\ud83d\udecf\ufe0f Establish a consistent sleep schedule (same bedtime and wake time daily)\",\r\n                \"\ud83c\udf19 Keep your bedroom cool, dark, and quiet\",\r\n                \"\ud83d\udcf1 Avoid screens 30-60 minutes before bed\",\r\n                \"\u2615 Limit caffeine after 2 PM\"\r\n            ])\r\n        \r\n        if sleep_score >= 75 and sleep_score < 85:\r\n            recommendations.extend([\r\n                \"\u2728 Consider one targeted improvement: optimize bedtime consistency\",\r\n                \"\ud83c\udfc3 Add moderate exercise earlier in the day\"\r\n            ])\r\n        \r\n        if sleep_score >= 85:\r\n            recommendations.append(\"\ud83c\udf1f Maintain your excellent sleep habits!\")\r\n        \r\n        # Specific recommendations based on data\r\n        if not sleep_df.empty and \"sleep_duration\" in sleep_df.columns:\r\n            avg_duration = sleep_df[\"sleep_duration\"].dropna().mean()\r\n            if avg_duration < 300:\r\n                recommendations.insert(0, \"\u23f0 Prioritize getting more sleep\u2014aim for 7 hours minimum\")\r\n        \r\n        return recommendations[:4]  # Return top 4 recommendations\r\n\r\n\r\nclass SleepPatterns:\r\n    \"\"\"Analyze sleep patterns and generate visualizations.\"\"\"\r\n    \r\n    @staticmethod\r\n    def get_sleep_heatmap_data(sleep_df: pd.DataFrame, time_col: str = \"start_datetime\") -> pd.DataFrame:\r\n        \"\"\"\r\n        Generate heatmap data: sleep duration by day of week.\r\n        Returns DataFrame with day_of_week, week, duration for heatmap visualization.\r\n        \"\"\"\r\n        if sleep_df.empty or time_col not in sleep_df.columns:\r\n            return pd.DataFrame()\r\n        \r\n        df = sleep_df.copy()\r\n        if not pd.api.types.is_datetime64_any_dtype(df[time_col]):\r\n            df[time_col] = pd.to_datetime(df[time_col], errors=\"coerce\")\r\n        \r\n        df = df.dropna(subset=[time_col])\r\n        if df.empty:\r\n            return pd.DataFrame()\r\n        \r\n        # Add day of week and week number\r\n        df[\"dow\"] = df[time_col].dt.day_name()\r\n        df[\"week\"] = df[time_col].dt.isocalendar().week\r\n        df[\"year\"] = df[time_col].dt.year\r\n        \r\n        # Group by week and day\r\n        if \"sleep_duration\" in df.columns:\r\n            heatmap = df.groupby([\"year\", \"week\", \"dow\"])[\"sleep_duration\"].mean().reset_index()\r\n            heatmap[\"duration_hours\"] = heatmap[\"sleep_duration\"] / 60\r\n            return heatmap\r\n        \r\n        return pd.DataFrame()\r\n    \r\n    @staticmethod\r\n    def get_sleep_cycle_stats(sleep_stage_df: Optional[pd.DataFrame]) -> dict:\r\n        \"\"\"\r\n        Calculate REM/Non-REM distribution and sleep cycle characteristics.\r\n        \"\"\"\r\n        if sleep_stage_df is None or sleep_stage_df.empty or \"stage\" not in sleep_stage_df.columns:\r\n            return {\r\n                \"total_cycles\": 0,\r\n                \"rem_percentage\": 0,\r\n                \"deep_sleep_percentage\": 0,\r\n                \"light_sleep_percentage\": 0,\r\n                \"awake_percentage\": 0\r\n            }\r\n        \r\n        stage_counts = sleep_stage_df[\"stage\"].value_counts()\r\n        total = len(sleep_stage_df)\r\n        \r\n        return {\r\n            \"total_cycles\": total,\r\n            \"rem_percentage\": float(stage_counts.get(40004, 0) / total * 100),  # 40004 = REM\r\n            \"deep_sleep_percentage\": float(stage_counts.get(40003, 0) / total * 100),  # 40003 = Deep\r\n            \"light_sleep_percentage\": float(stage_counts.get(40002, 0) / total * 100),  # 40002 = Light\r\n            \"awake_percentage\": float(stage_counts.get(40001, 0) / total * 100)  # 40001 = Awake\r\n        }\r\n", "src/utils.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"Shared utilities for wellfair and health-to-solid semantic export.\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom pathlib import Path\nfrom typing import Any\n\nPROJECT_ROOT = Path(__file__).resolve().parent.parent\nROOT = PROJECT_ROOT\nDEFAULT_EXPORT_DIR = PROJECT_ROOT / \"20250221_SamsungHealth\"\nDEFAULT_TEMPLATE_PATH = PROJECT_ROOT / \"config\" / \"ontology_template.yaml\"\nDEFAULT_OUTPUT_PATH = PROJECT_ROOT / \"output\" / \"solid_pod\"\n\n# Resolved lazily \u2014 real export is nested under 20250221_SamsungHealth/\n_DEFAULT_EXPORT_ROOT: Path | None = None\n\n\ndef resolve_export_root(path: str | Path) -> Path:\n    \"\"\"\n    Find the Samsung export folder that contains CSV files.\n\n    Accepts the zip extract root (e.g. 20250221_SamsungHealth/) or the inner\n    samsunghealth_* folder directly.\n    \"\"\"\n    root = Path(path).resolve()\n    if not root.is_dir():\n        raise FileNotFoundError(f\"Export folder not found: {root}\")\n\n    csv_here = list(root.glob(\"*.csv\"))\n    if csv_here:\n        return root\n\n    best_dir: Path | None = None\n    best_count = 0\n    for csv_path in root.rglob(\"*.csv\"):\n        parent = csv_path.parent\n        count = len(list(parent.glob(\"*.csv\")))\n        if count > best_count:\n            best_count = count\n            best_dir = parent\n\n    if best_dir is not None and best_count > 0:\n        return best_dir\n\n    raise FileNotFoundError(f\"No Samsung Health CSV export found under: {root}\")\n\n\ndef get_default_export_path() -> Path:\n    \"\"\"Default export path (resolves nested Samsung folder when present).\"\"\"\n    global _DEFAULT_EXPORT_ROOT\n    if _DEFAULT_EXPORT_ROOT is not None:\n        return _DEFAULT_EXPORT_ROOT\n    if DEFAULT_EXPORT_DIR.is_dir():\n        try:\n            _DEFAULT_EXPORT_ROOT = resolve_export_root(DEFAULT_EXPORT_DIR)\n            return _DEFAULT_EXPORT_ROOT\n        except FileNotFoundError:\n            pass\n    fallback = PROJECT_ROOT / \"data\" / \"synthetic_samsung_export\"\n    _DEFAULT_EXPORT_ROOT = fallback if fallback.is_dir() else DEFAULT_EXPORT_DIR\n    return _DEFAULT_EXPORT_ROOT\n\n\n# Back-compat name used by UI/tests\nDEFAULT_EXPORT_PATH = get_default_export_path()\n\n\ndef resolve_path(path: str | Path, base: Path | None = None) -> Path:\n    \"\"\"Resolve relative paths against project root or given base.\"\"\"\n    p = Path(path)\n    if p.is_absolute():\n        return p.resolve()\n    root = base or PROJECT_ROOT\n    return (root / p).resolve()\n\n\ndef data_type_from_filename(filename: str) -> str:\n    \"\"\"\n    Extract Samsung data type key from export CSV filename.\n    e.g. com.samsung.health.weight.20250221185535.csv -> com.samsung.health.weight\n    \"\"\"\n    stem = Path(filename).stem\n    match = re.match(r\"^(.+?)\\.(\\d{8,})$\", stem)\n    if match:\n        return match.group(1)\n    return stem\n\n\ndef clean_column_name(col: str) -> str:\n    \"\"\"\n    Normalize Samsung column headers to short field names.\n    e.g. com.samsung.health.sleep.start_time -> start_time\n    \"\"\"\n    col = str(col).strip()\n    match = re.match(\n        r\"^com\\.samsung\\.(?:health|shealth)\\.(?:[\\w.]+\\.)?(.+)$\",\n        col,\n    )\n    if match:\n        return match.group(1)\n    for prefix in (\n        \"com.samsung.health.\",\n        \"com.samsung.shealth.\",\n        \"com.samsung.\",\n    ):\n        if col.startswith(prefix):\n            return col[len(prefix) :]\n    if \".\" in col:\n        return col.split(\".\")[-1]\n    return col\n\n\ndef safe_str(value: Any) -> str | None:\n    if value is None or (isinstance(value, float) and str(value) == \"nan\"):\n        return None\n    s = str(value).strip()\n    return s if s and s.lower() != \"nan\" else None\n\n\ndef get_export_mtime(export_path: str | Path) -> float:\n    \"\"\"Find the maximum modification timestamp among all CSV files in the export folder.\"\"\"\n    root = Path(export_path).resolve()\n    if not root.is_dir():\n        return 0.0\n    \n    max_mtime = 0.0\n    for path in root.rglob(\"*.csv\"):\n        try:\n            mtime = path.stat().st_mtime\n            if mtime > max_mtime:\n                max_mtime = mtime\n        except Exception:\n            pass\n    return max_mtime\n\n\ndef check_cache_status(export_path: str | Path, output_path: str | Path) -> tuple[bool, str]:\n    \"\"\"\n    Checks if the local pickle cache is stale compared to the raw export files.\n    Returns (is_stale: bool, reason: str).\n    \"\"\"\n    cache_file = Path(output_path).resolve() / \"local_cache.pkl\"\n    if not cache_file.exists():\n        return True, \"No local cache found.\"\n        \n    try:\n        cache_mtime = cache_file.stat().st_mtime\n        export_mtime = get_export_mtime(export_path)\n        \n        if export_mtime == 0.0:\n            return False, \"Export folder contains no CSV files. Cache is assumed up-to-date.\"\n            \n        if export_mtime > cache_mtime:\n            return True, \"Export CSV files have been updated since last sync.\"\n            \n        return False, \"Cache is up-to-date with export files.\"\n    except Exception as e:\n        return True, f\"Failed to verify cache: {e}\"\n\n\ndef save_uploaded_pdf(uploaded_file, subdir=\"psychiatric\") -> str:\n    \"\"\"Save an uploaded PDF to the project's data assessments directory.\n\n    Parameters\n    ----------\n    uploaded_file: UploadedFile\n        Streamlit uploaded file object.\n    subdir: str, optional\n        Subdirectory under ``data/assessments``; default ``\"psychiatric\"``.\n\n    Returns\n    -------\n    str\n        Absolute file URI (``file://``) of the saved PDF.\n    \"\"\"\n    # Ensure target directory exists\n    target_dir = PROJECT_ROOT / \"data\" / \"assessments\" / subdir\n    target_dir.mkdir(parents=True, exist_ok=True)\n\n    # Resolve safe filename and write bytes\n    filename = Path(uploaded_file.name).name\n    target_path = target_dir / filename\n    with open(target_path, \"wb\") as f:\n        f.write(uploaded_file.getbuffer())\n\n    return target_path.as_uri()\n", "src/__init__.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"wellfair: Samsung Health export \u2192 Solid-ready RDF and broader wellbeing informatics.\"\"\"\n", "src/phr_models/agents.py": "from enum import Enum\nfrom typing import List, Optional, Any\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode, LegalBasis\n\nclass ActorType(str, Enum):\n    ORGANIZATION = \"organization\"\n    PRACTITIONER = \"practitioner\"\n    DELEGATE = \"delegate\"\n    SYNTHETIC_AGENT = \"synthetic_agent\"\n\nclass VerificationStatus(str, Enum):\n    VERIFIED = \"verified\"\n    UNVERIFIED = \"unverified\"\n    SELF_CLAIMED = \"self_claimed\"\n\nclass Actor(BaseModel):\n    \"\"\"Represents an organization, practitioner, delegate, or synthetic agent.\"\"\"\n    id: str\n    actor_type: ActorType\n    name: str\n    organization: Optional[str] = None\n    qualifications: List[str] = Field(default_factory=list, description=\"Degrees, credentials, registrations, certifications\")\n    roles: List[str] = Field(default_factory=list, description=\"Roles they perform in the welfare ecosystem\")\n    verification_status: VerificationStatus = Field(default=VerificationStatus.UNVERIFIED)\n    did_uri: Optional[str] = Field(None, description=\"Decentralized Identifier (DID) URI\")\n\nclass DelegationRule(BaseModel):\n    \"\"\"Granular access policy linking an Actor to patient records and claims.\"\"\"\n    id: str\n    patient_id: str\n    actor_id: str\n    granted_roles: List[str] = Field(default_factory=list, description=\"e.g. read_pathology, verify_claims\")\n    legal_basis: LegalBasis\n    privacy_mode_limit: PrivacyMode = Field(default=PrivacyMode.MODE_B_PRIVILEGED, description=\"The maximum privacy mode clearance\")\n    allowed_record_types: List[str] = Field(default_factory=list, description=\"Whitelist of model names (e.g. PathologyObservation)\")\n    restricted_records: List[str] = Field(default_factory=list, description=\"Blacklist of model names\")\n    linked_case_ids: List[str] = Field(default_factory=list, description=\"Scope limited to these case files\")\n    is_active: bool = Field(default=True)\n\ndef evaluate_access(actor: Actor, rule: DelegationRule, record: Any) -> tuple[bool, list[str]]:\n    \"\"\"\n    Evaluates whether an Actor can access a specific record under a DelegationRule.\n    Returns (access_granted: bool, evaluation_log: list[str]).\n    \"\"\"\n    log = []\n    log.append(f\"Starting access evaluation for Actor '{actor.name}' ({actor.actor_type.value})\")\n    \n    if not rule.is_active:\n        log.append(\"DENIED: Delegation rule is inactive.\")\n        return False, log\n    log.append(\"OK: Delegation rule is active.\")\n    \n    # Check Actor binding\n    if rule.actor_id != actor.id:\n        log.append(f\"DENIED: Rule is bound to actor ID '{rule.actor_id}', but evaluator received ID '{actor.id}'.\")\n        return False, log\n        \n    # Get record privacy mode\n    record_privacy = getattr(record, \"privacy_mode\", None)\n    if record_privacy is not None:\n        log.append(f\"Check: Record has privacy mode '{record_privacy.name}' ({record_privacy.value})\")\n        log.append(f\"Check: Actor clearance limit is '{rule.privacy_mode_limit.name}' ({rule.privacy_mode_limit.value})\")\n        \n        # Privacy modes: A is highest (Strict), B is Privileged, C is normal (Shared)\n        # MODE_A_STRICT = \"V\"\n        # MODE_B_PRIVILEGED = \"R\"\n        # MODE_C_SHARED = \"N\"\n        # Hierarchy: A requires A clearance. B requires A or B clearance. C requires A, B, or C clearance.\n        clearance_hierarchy = {\n            PrivacyMode.MODE_A_STRICT: 3,\n            PrivacyMode.MODE_B_PRIVILEGED: 2,\n            PrivacyMode.MODE_C_SHARED: 1\n        }\n        \n        rec_val = clearance_hierarchy.get(record_privacy, 1)\n        actor_val = clearance_hierarchy.get(rule.privacy_mode_limit, 1)\n        \n        if actor_val < rec_val:\n            log.append(f\"DENIED: Actor clearance level ({rule.privacy_mode_limit.name}) is insufficient for record level ({record_privacy.name}).\")\n            return False, log\n        log.append(\"OK: Privacy mode clearance verified.\")\n    else:\n        log.append(\"Note: Record does not declare an explicit privacy_mode (access allowed by default).\")\n        \n    # Check record type whitelist / blacklist\n    record_class_name = record.__class__.__name__\n    log.append(f\"Check: Record model class is '{record_class_name}'\")\n    \n    if rule.restricted_records:\n        if record_class_name in rule.restricted_records:\n            log.append(f\"DENIED: Record class '{record_class_name}' is blacklisted in rule.restricted_records.\")\n            return False, log\n            \n    if rule.allowed_record_types:\n        if record_class_name not in rule.allowed_record_types:\n            log.append(f\"DENIED: Record class '{record_class_name}' is not in rule.allowed_record_types whitelist.\")\n            return False, log\n        log.append(f\"OK: Record class '{record_class_name}' is whitelisted.\")\n        \n    log.append(f\"GRANTED: All policies evaluated successfully. Access allowed for '{actor.name}'.\")\n    return True, log\n", "src/phr_models/cases.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"\nCase Management & Claims \u2014 Pydantic models.\n\nEnables users to manage \"case files\" tracking hypotheses, claims, routine checks,\nor interval tests. Integrates with My Health Record/Solid pod architecture for\nevidence collection, data-linking (Samsung Health), and proxy-consent controls.\n\"\"\"\n\nfrom enum import Enum\nfrom typing import Optional, List\nfrom datetime import datetime, date\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\nclass CaseCategory(str, Enum):\n    SUSPECTED_CONDITION = \"suspected-condition\"\n    ROUTINE_CHECK = \"routine-check\"\n    INTERVAL_TEST = \"interval-test\"\n    OTHER = \"other\"\n\nclass CaseStatus(str, Enum):\n    SUSPECTED = \"suspected\"\n    INVESTIGATING = \"investigating\"\n    ACTIVE = \"active\"\n    MONITORING = \"monitoring\"\n    RESOLVED = \"resolved\"\n    CLOSED = \"closed\"\n\nclass CaseTask(BaseModel):\n    id: str\n    title: str\n    description: Optional[str] = None\n    due_date: Optional[date] = None\n    completed_date: Optional[date] = None\n    is_completed: bool = False\n\nclass CaseFile(BaseModel):\n    id: str\n    patient_id: str\n    title: str\n    category: CaseCategory\n    status: CaseStatus = CaseStatus.SUSPECTED\n    hypothesis_or_claim: str = Field(..., description=\"The core claim, hypothesis, or reason for the case file\")\n    date_created: datetime\n    date_updated: datetime\n    privacy_mode: PrivacyMode = PrivacyMode.MODE_A_STRICT\n    \n    # Links & Metadata\n    supporting_documents: List[str] = Field(default_factory=list, description=\"Linked SupportingDocument IDs\")\n    linked_psych_observations: List[str] = Field(default_factory=list, description=\"Linked PsychiatryObservation IDs\")\n    linked_datatypes: List[str] = Field(default_factory=list, description=\"Linked Samsung Health data types (e.g. com.samsung.shealth.sleep)\")\n    \n    tasks: List[CaseTask] = Field(default_factory=list)\n    notes: Optional[str] = None\n", "src/phr_models/claims.py": "from enum import Enum\nfrom typing import Optional, List, Dict, Any\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\nclass TrustLevel(str, Enum):\n    VERIFIED_CLINICAL = \"verified-clinical\"\n    VERIFIED_DEVICE = \"verified-device\"\n    UNVERIFIED_SELF = \"unverified-self\"\n    UNVERIFIED_THIRD_PARTY = \"unverified-third-party\"\n    OUT_OF_SCOPE = \"out-of-scope\"\n    CONFLICTING = \"conflicting\"\n\nclass AuthorType(str, Enum):\n    SELF = \"self\"\n    CLINICIAN_GP = \"clinician-gp\"\n    CLINICIAN_SPECIALIST = \"clinician-specialist\"\n    PATHOLOGY_LAB = \"pathology-lab\"\n    CARER = \"carer\"\n    DEVICE_SENSOR = \"device-sensor\"\n\nclass InformationSource(BaseModel):\n    \"\"\"Represents the origin of a document or claim.\"\"\"\n    id: str\n    author_type: AuthorType\n    author_name: str\n    organization: Optional[str] = None\n    credentials: Optional[str] = Field(None, description=\"e.g. AHPRA number, NATA accreditation\")\n    date_recorded: datetime\n\nclass ClinicalClaim(BaseModel):\n    \"\"\"An atomic assertion extracted from a document.\"\"\"\n    id: str\n    source_document_id: str\n    subject_id: str = Field(default=\"patient-self\")\n    domain: str = Field(..., description=\"e.g. Pathology, Psychiatry, Medication\")\n    claim_text: str = Field(..., description=\"The raw assertion text or key-value\")\n    extracted_data: Dict[str, Any] = Field(default_factory=dict, description=\"Structured parsed data\")\n    \n    # Claim Evaluation\n    trust_level: TrustLevel = Field(default=TrustLevel.UNVERIFIED_SELF)\n    evaluation_notes: Optional[str] = Field(None, description=\"Why this trust level was assigned\")\n    \n    privacy_mode: PrivacyMode = Field(default=PrivacyMode.MODE_B_PRIVILEGED)\n\nclass ContentPackage(BaseModel):\n    \"\"\"A container for a processed document and its resulting structured claims.\"\"\"\n    id: str\n    original_file_name: str\n    upload_date: datetime\n    source: InformationSource\n    raw_extracted_text: str\n    claims: List[ClinicalClaim] = Field(default_factory=list)\n    status: str = Field(default=\"Draft\", description=\"Draft, Approved, Rejected\")\n    \n    def evaluate_claims(self):\n        \"\"\"Basic semantic evaluation based on author scope.\"\"\"\n        for claim in self.claims:\n            if self.source.author_type == AuthorType.PATHOLOGY_LAB and claim.domain == \"Pathology\":\n                claim.trust_level = TrustLevel.VERIFIED_CLINICAL\n                claim.evaluation_notes = \"In-scope assertion by accredited laboratory.\"\n            elif self.source.author_type == AuthorType.SELF and claim.domain == \"Pathology\":\n                claim.trust_level = TrustLevel.UNVERIFIED_SELF\n                claim.evaluation_notes = \"Self-reported lab result. Requires formal verification.\"\n            elif self.source.author_type == AuthorType.CLINICIAN_GP and claim.domain == \"Psychiatry\":\n                claim.trust_level = TrustLevel.VERIFIED_CLINICAL\n                claim.evaluation_notes = \"GP observation. May require specialist for formal diagnosis.\"\n            else:\n                claim.trust_level = TrustLevel.UNVERIFIED_SELF\n", "src/phr_models/life_events.py": "# Copyright (C) 2025-2026 Timothy Charles Holborn <timothy.holborn@gmail.com>\n# https://www.linkedin.com/in/ubiquitous/\n#\n# SPDX-License-Identifier: GPL-3.0-or-later\n\n\"\"\"\nSocioeconomic Wellbeing & Life Events \u2014 Pydantic models.\n\nCaptures major life transitions (job loss, divorce, homelessness, etc.)\nas pivotal nodes that intersect financial, legal, professional, housing,\nand relational domains.  Every record integrates with the PrivacyMode\nconsent engine and supports cross-linking to psychiatric observations,\nproxy relationships, and supporting documents.\n\nReference: instructions/social_biostatistics\n\"\"\"\n\nfrom enum import Enum\nfrom typing import Optional, List\nfrom datetime import datetime, date\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\n# ---------------------------------------------------------------------------\n# Enums\n# ---------------------------------------------------------------------------\n\nclass LifeEventCategory(str, Enum):\n    \"\"\"Taxonomy of major life events (Section 3, social_biostatistics).\"\"\"\n    JOB_LOSS = \"job-loss\"\n    DIVORCE_SEPARATION = \"divorce-separation\"\n    BANKRUPTCY = \"bankruptcy\"\n    HOMELESSNESS = \"homelessness\"\n    HEALTH_CRISIS = \"health-crisis\"\n    INCARCERATION = \"incarceration\"\n    MIGRATION = \"migration\"\n    NATURAL_DISASTER = \"natural-disaster\"\n    BEREAVEMENT = \"bereavement\"\n    DOMESTIC_VIOLENCE = \"domestic-violence\"\n    DISABILITY_ONSET = \"disability-onset\"\n    EDUCATION_TRANSITION = \"education-transition\"\n    RETIREMENT = \"retirement\"\n    OTHER = \"other\"\n\n\nclass WellbeingDimension(str, Enum):\n    \"\"\"OECD Well-being Framework aligned impact dimensions (Section 2).\"\"\"\n    INCOME_WEALTH = \"income-wealth\"\n    EMPLOYMENT = \"employment\"\n    HOUSING = \"housing\"\n    HEALTH_PHYSICAL = \"health-physical\"\n    HEALTH_MENTAL = \"health-mental\"\n    EDUCATION_SKILLS = \"education-skills\"\n    SOCIAL_CONNECTIONS = \"social-connections\"\n    WORK_LIFE_BALANCE = \"work-life-balance\"\n    CIVIC_ENGAGEMENT = \"civic-engagement\"\n    SAFETY = \"safety\"\n    SUBJECTIVE_WELLBEING = \"subjective-wellbeing\"\n    RIGHTS_LEGAL = \"rights-legal\"\n\n\nclass SeverityLevel(str, Enum):\n    LOW = \"low\"\n    MODERATE = \"moderate\"\n    HIGH = \"high\"\n    CRITICAL = \"critical\"\n\n\nclass DocumentCategory(str, Enum):\n    \"\"\"Categories for supporting documents (Section 4).\"\"\"\n    LEGAL = \"legal\"\n    PROFESSIONAL = \"professional\"\n    FINANCIAL = \"financial\"\n    HOUSING = \"housing\"\n    RELATIONAL = \"relational\"\n    GOVERNMENT = \"government\"\n    MEDICAL = \"medical\"\n\n\nclass RecoveryStatus(str, Enum):\n    NOT_STARTED = \"not-started\"\n    IN_PROGRESS = \"in-progress\"\n    STABLE = \"stable\"\n    RESOLVED = \"resolved\"\n\n\nclass MaslowLayer(str, Enum):\n    \"\"\"Optional Maslow's hierarchy tagging for multi-model vault views.\"\"\"\n    PHYSIOLOGICAL = \"physiological\"\n    SAFETY = \"safety\"\n    BELONGING = \"belonging\"\n    ESTEEM = \"esteem\"\n    SELF_ACTUALISATION = \"self-actualisation\"\n\n\nclass DataQualityTag(str, Enum):\n    EXACT = \"exact\"\n    ESTIMATE = \"estimate\"\n    SELF_REPORT = \"self-report\"\n    PROFESSIONAL_VERIFIED = \"professional-verified\"\n\n\n# ---------------------------------------------------------------------------\n# Sub-models\n# ---------------------------------------------------------------------------\n\nclass SupportingDocument(BaseModel):\n    \"\"\"Lightweight metadata reference to an encrypted document.\n\n    The vault stores a URI to the encrypted original; full document\n    parsing (PDF extraction of court orders, etc.) is a future iteration.\n    \"\"\"\n\n    id: str\n    title: str = Field(..., description=\"Human-readable document title\")\n    category: DocumentCategory\n    document_uri: str = Field(\n        ..., description=\"Secure URI to the encrypted stored document\"\n    )\n    date_issued: Optional[datetime] = None\n    jurisdiction: Optional[str] = Field(\n        None,\n        description=\"e.g. 'AU-NSW', 'AU-FED', 'AU-QLD' or ISO 3166-2 code\",\n    )\n    description: Optional[str] = None\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_A_STRICT,\n        description=\"Legal documents default to strict privacy\",\n    )\n\n\nclass WellbeingImpact(BaseModel):\n    \"\"\"Assessment of how a life event impacts a specific wellbeing dimension.\"\"\"\n\n    dimension: WellbeingDimension\n    severity: SeverityLevel\n    description: Optional[str] = Field(\n        None, description=\"Narrative describing the impact\"\n    )\n    date_assessed: Optional[datetime] = None\n\n\nclass RecoveryIndicator(BaseModel):\n    \"\"\"A milestone or support action in the recovery pathway post-event.\"\"\"\n\n    id: str\n    description: str = Field(\n        ..., description=\"e.g. 'Register with Centrelink', 'Attend retraining'\"\n    )\n    status: RecoveryStatus = Field(default=RecoveryStatus.NOT_STARTED)\n    target_date: Optional[date] = None\n    completed_date: Optional[date] = None\n    linked_service: Optional[str] = Field(\n        None,\n        description=\"Service or organisation supporting this milestone\",\n    )\n\n\n# ---------------------------------------------------------------------------\n# Core model\n# ---------------------------------------------------------------------------\n\nclass LifeEvent(BaseModel):\n    \"\"\"Core life event record for the Personal Welfare Informatics Vault.\n\n    Maps to the taxonomy in Section 3 of social_biostatistics.\n    Integrates with ProxyConsent (privacy_mode, proxy recording),\n    PsychiatryObservation (cross-linked symptoms), and the\n    SupportingDocument registry.\n    \"\"\"\n\n    id: str\n    patient_id: str\n    event_category: LifeEventCategory\n    title: str = Field(..., description=\"Short human-readable event title\")\n    description: Optional[str] = Field(\n        None, description=\"Narrative context about the event\"\n    )\n\n    # Temporal\n    trigger_date: datetime = Field(\n        ..., description=\"When the event started or was triggered\"\n    )\n    end_date: Optional[datetime] = Field(\n        None, description=\"None for ongoing events\"\n    )\n\n    severity: SeverityLevel = Field(default=SeverityLevel.MODERATE)\n\n    # Privacy & proxy\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_A_STRICT,\n        description=\"Life events default to strict \u2014 many involve trauma\",\n    )\n    recorded_by_proxy_id: Optional[str] = Field(\n        None, description=\"If logged by a carer, links to RelatedPerson ID\"\n    )\n    involved_parties: List[str] = Field(\n        default_factory=list,\n        description=\"RelatedPerson IDs of people involved in the event\",\n    )\n\n    # Impact & recovery\n    wellbeing_impacts: List[WellbeingImpact] = Field(default_factory=list)\n    supporting_documents: List[SupportingDocument] = Field(default_factory=list)\n    recovery_indicators: List[RecoveryIndicator] = Field(default_factory=list)\n\n    # Cross-references\n    linked_psych_observation_ids: List[str] = Field(\n        default_factory=list,\n        description=\"Links to PsychiatryObservation IDs triggered by this event\",\n    )\n    linked_medication_ids: List[str] = Field(\n        default_factory=list,\n        description=\"Links to MedicationAdministration IDs related to this event\",\n    )\n\n    # Multi-model vault support\n    maslow_layer: Optional[MaslowLayer] = Field(\n        None,\n        description=\"Optional Maslow's hierarchy layer for needs-based vault views\",\n    )\n\n    data_quality_tag: DataQualityTag = Field(default=DataQualityTag.SELF_REPORT)\n    notes: Optional[str] = Field(\n        None, description=\"Free-text notes or journal entries about the event\"\n    )\n", "src/phr_models/location.py": "from enum import Enum\nfrom typing import Optional\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\nclass SemanticCategory(str, Enum):\n    HOME = \"home\"\n    WORK = \"work\"\n    MEDICAL_FACILITY = \"medical-facility\"\n    TRAVEL = \"travel\"\n    OTHER = \"other\"\n\n\nclass GeoEvent(BaseModel):\n    \"\"\"Custom high-volume time-series geospatial event.\"\"\"\n\n    id: str\n    patient_id: str\n    timestamp: datetime\n    latitude: float\n    longitude: float\n    category: SemanticCategory = Field(default=SemanticCategory.OTHER)\n\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_C_SHARED,\n        description=\"Locations default to lower sensitivity unless tagged\",\n    )\n    linked_symptom_id: Optional[str] = Field(\n        None,\n        description=\"Link to PsychiatryObservation to correlate environment with mood/symptoms\",\n    )\n", "src/phr_models/medications.py": "from enum import Enum\nfrom typing import Optional\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\nclass AdherenceStatus(str, Enum):\n    TAKEN = \"completed\"\n    MISSED = \"not-done\"\n    STOPPED = \"stopped\"\n    ON_HOLD = \"on-hold\"\n    UNKNOWN = \"unknown\"\n\n\nclass DataQualityTag(str, Enum):\n    EXACT = \"exact\"\n    ESTIMATE = \"estimate\"\n    DEVICE_IMPORTED = \"device-imported\"\n    SELF_REPORT = \"self-report\"\n\n\nclass SubstanceCategory(str, Enum):\n    PRESCRIBED = \"prescribed\"\n    OVER_THE_COUNTER = \"over-the-counter\"\n    SUPPLEMENT = \"supplement\"\n    LEGAL_RECREATIONAL = \"legal-recreational\"  # e.g., Alcohol, Nicotine, Caffeine\n    ILLICIT = \"illicit\"\n\n\nclass MedicationAdministration(BaseModel):\n    \"\"\"FHIR MedicationAdministration mapped for adherence tracking, including broader substances.\"\"\"\n\n    id: str\n    patient_id: str\n    medication_name: str\n    category: SubstanceCategory = Field(default=SubstanceCategory.PRESCRIBED)\n    status: AdherenceStatus = Field(..., description=\"Adherence status\")\n    effective_time: datetime = Field(\n        ..., description=\"When the dose was taken or missed\"\n    )\n    quality_tag: DataQualityTag = Field(default=DataQualityTag.EXACT)\n    privacy_mode: PrivacyMode = Field(default=PrivacyMode.MODE_B_PRIVILEGED, description=\"Illicit substances should default to Mode A\")\n\n    # Proxy support\n    recorded_by_proxy_id: Optional[str] = Field(\n        None, description=\"If carer-logged, links to RelatedPerson ID\"\n    )\n    notes: Optional[str] = Field(\n        None, description=\"Reason for missing/stopping or general notes\"\n    )\n", "src/phr_models/nutrition.py": "from enum import Enum\nfrom typing import Optional, List\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\nclass IntakeType(str, Enum):\n    FOOD_MEAL = \"food-meal\"\n    FOOD_SNACK = \"food-snack\"\n    FLUID_WATER = \"fluid-water\"\n    FLUID_SUGARY = \"fluid-sugary\"\n    FLUID_CAFFEINATED = \"fluid-caffeinated\"\n    FLUID_ALCOHOL = \"fluid-alcohol\"\n\nclass FastingState(str, Enum):\n    FASTING = \"fasting\"\n    NON_FASTING = \"non-fasting\"\n    UNKNOWN = \"unknown\"\n\nclass NutritionIntake(BaseModel):\n    \"\"\"FHIR NutritionIntake mapped for food, fluid, and socioeconomic tracking.\"\"\"\n    id: str\n    patient_id: str\n    timestamp: datetime\n    intake_type: IntakeType\n    description: str = Field(..., description=\"e.g. 1 glass of wine, bowl of cereal\")\n    \n    # Optional metrics\n    calories_kcals: Optional[float] = None\n    fluid_volume_ml: Optional[float] = None\n    \n    # Context\n    fasting_state: FastingState = Field(default=FastingState.UNKNOWN, description=\"Useful context for pathology\")\n    socioeconomic_flag: bool = Field(default=False, description=\"Flag for food insecurity / skipped meals due to financial stress\")\n    \n    privacy_mode: PrivacyMode = Field(default=PrivacyMode.MODE_C_SHARED)\n    \n    # Links\n    linked_location_id: Optional[str] = Field(None, description=\"Where did this occur?\")\n    linked_psych_obs_id: Optional[str] = Field(None, description=\"If linked to eating disorder/mood observation\")\n    recorded_by_proxy_id: Optional[str] = Field(None, description=\"If logged by carer/guardian\")\n", "src/phr_models/pathology.py": "from enum import Enum\nfrom typing import Optional, List\nfrom datetime import datetime\nfrom pydantic import BaseModel, Field\nfrom src.phr_models.proxy_consent import PrivacyMode\n\n\nclass DiagnosticReportStatus(str, Enum):\n    PRELIMINARY = \"preliminary\"\n    FINAL = \"final\"\n    AMENDED = \"amended\"\n\n\nclass PathologyObservation(BaseModel):\n    \"\"\"FHIR Observation mapped for individual lab results.\"\"\"\n\n    id: str\n    test_name: str = Field(..., description=\"e.g. Blood Glucose\")\n    value: float\n    unit: str\n    reference_range_low: Optional[float] = None\n    reference_range_high: Optional[float] = None\n    privacy_mode: PrivacyMode = Field(\n        default=PrivacyMode.MODE_B_PRIVILEGED,\n        description=\"Can be set to Mode A for sensitive tests\",\n    )\n\n\nclass DiagnosticReport(BaseModel):\n    \"\"\"FHIR DiagnosticReport representing the full pathology PDF.\"\"\"\n\n    id: str\n    patient_id: str\n    date_issued: datetime\n    status: DiagnosticReportStatus = Field(default=DiagnosticReportStatus.PRELIMINARY)\n    pdf_attachment_uri: str = Field(\n        ..., description=\"Secure URI to the encrypted original PDF\"\n    )\n    observations: List[PathologyObservation] = Field(default_factory=list)\n\n    privacy_mode: PrivacyMode = Field(default=PrivacyMode.MODE_B_PRIVILEGED)\n    recorded_by_proxy_id: Optional[str] = Field(\n        None, description=\"If imported by carer\"\n    )\n", "src/phr_models/phr_schema.json": "{\r\n  \"RelatedPerson\": {\r\n    \"$defs\": {\r\n      \"ProxyRelationship\": {\r\n        \"enum\": [\r\n          \"PRN\",\r\n          \"DEP\",\r\n          \"GUARD\",\r\n          \"PART\",\r\n          \"CARE\"\r\n        ],\r\n        \"title\": \"ProxyRelationship\",\r\n        \"type\": \"string\"\r\n      }\r\n    },\r\n    \"description\": \"FHIR AU Core mapped RelatedPerson for proxy contexts.\",\r\n    \"properties\": {\r\n      \"id\": {\r\n        \"description\": \"Unique ID for the proxy/related person\",\r\n        \"title\": \"Id\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"patient_id\": {\r\n        \"description\": \"The primary subject of the record\",\r\n        \"title\": \"Patient Id\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"relationship\": {\r\n        \"$ref\": \"#/$defs/ProxyRelationship\",\r\n        \"description\": \"SNOMED/HL7 relationship code\"\r\n      },\r\n      \"is_anonymous\": {\r\n        \"default\": false,\r\n        \"description\": \"True if the proxy must remain de-identified for safety\",\r\n        \"title\": \"Is Anonymous\",\r\n        \"type\": \"boolean\"\r\n      },\r\n      \"description\": {\r\n        \"anyOf\": [\r\n          {\r\n            \"type\": \"string\"\r\n          },\r\n          {\r\n            \"type\": \"null\"\r\n          }\r\n        ],\r\n        \"default\": null,\r\n        \"description\": \"Minimally identifying description of the proxy\",\r\n        \"title\": \"Description\"\r\n      }\r\n    },\r\n    \"required\": [\r\n      \"id\",\r\n      \"patient_id\",\r\n      \"relationship\"\r\n    ],\r\n    \"title\": \"RelatedPerson\",\r\n    \"type\": \"object\"\r\n  },\r\n  \"ProxyConsent\": {\r\n    \"$defs\": {\r\n      \"LegalBasis\": {\r\n        \"enum\": [\r\n          \"explicit-consent\",\r\n          \"guardian-authority\",\r\n          \"mha-nominated\",\r\n          \"safety-override\"\r\n        ],\r\n        \"title\": \"LegalBasis\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"PrivacyMode\": {\r\n        \"enum\": [\r\n          \"V\",\r\n          \"R\",\r\n          \"N\"\r\n        ],\r\n        \"title\": \"PrivacyMode\",\r\n        \"type\": \"string\"\r\n      }\r\n    },\r\n    \"description\": \"FHIR Consent resource mapping bridging the Patient and the Proxy.\",\r\n    \"properties\": {\r\n      \"id\": {\r\n        \"title\": \"Id\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"patient_id\": {\r\n        \"title\": \"Patient Id\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"proxy_id\": {\r\n        \"description\": \"References the RelatedPerson.id acting as the proxy\",\r\n        \"title\": \"Proxy Id\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"legal_basis\": {\r\n        \"$ref\": \"#/$defs/LegalBasis\"\r\n      },\r\n      \"privacy_mode\": {\r\n        \"$ref\": \"#/$defs/PrivacyMode\",\r\n        \"default\": \"V\"\r\n      },\r\n      \"audit_silenced\": {\r\n        \"default\": false,\r\n        \"description\": \"If True, suppresses standard audit trails for safety-override reasons.\",\r\n        \"title\": \"Audit Silenced\",\r\n        \"type\": \"boolean\"\r\n      }\r\n    },\r\n    \"required\": [\r\n      \"id\",\r\n      \"patient_id\",\r\n      \"proxy_id\",\r\n      \"legal_basis\"\r\n    ],\r\n    \"title\": \"ProxyConsent\",\r\n    \"type\": \"object\"\r\n  },\r\n  \"PsychiatryObservation\": {\r\n    \"$defs\": {\r\n      \"DataQualityTag\": {\r\n        \"enum\": [\r\n          \"exact\",\r\n          \"estimate\"\r\n        ],\r\n        \"title\": \"DataQualityTag\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"ObservationContext\": {\r\n        \"enum\": [\r\n          \"self-reported\",\r\n          \"carer-observed\",\r\n          \"clinician-observed\"\r\n        ],\r\n        \"title\": \"ObservationContext\",\r\n        \"type\": \"string\"\r\n      },\r\n      \"PrivacyMode\": {\r\n        \"enum\": [\r\n          \"V\",\r\n          \"R\",\r\n          \"N\"\r\n        ],\r\n        \"title\": \"PrivacyMode\",\r\n        \"type\": \"string\"\r\n      }\r\n    },\r\n    \"description\": \"FHIR Obse
